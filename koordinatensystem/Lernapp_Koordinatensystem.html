<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Geografische Koordinaten – Lernreise</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#eef3f9;--card:#fff;--ink:#27324a;--muted:#67738c;
  --primary:#3f6fb5;--primary-d:#345a93;--accent:#2a9d8f;
  --lat:#e4572e;--lon:#3a86ff;--gold:#e0a700;
  --good:#2a9d8f;--bad:#e4572e;--soft:#dde6f2;
  --shadow:0 8px 24px rgba(40,60,90,.10);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
  background:linear-gradient(160deg,#eaf1fb,#eef6f3);color:var(--ink);font-size:18px;line-height:1.55;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--soft);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-weight:800;font-size:1.25rem;color:var(--primary-d)}
.score-pill{margin-left:auto;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;
  padding:8px 16px;border-radius:999px;font-weight:700;display:flex;gap:8px;align-items:center;box-shadow:var(--shadow)}
.score-pill b{font-size:1.15rem}
.nav{display:flex;gap:8px;overflow-x:auto;padding:10px 16px}
.nav button{flex:0 0 auto;border:2px solid transparent;padding:8px 16px;border-radius:12px;font-size:.95rem;
  font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(40,60,90,.06);transition:.2s;white-space:nowrap}
.nav button.locked{opacity:.4;cursor:not-allowed}
.nav button.done::after{content:" ✓";font-weight:800}
main{max-width:920px;margin:0 auto;padding:18px 16px 80px}
.step{display:none;animation:fade .35s ease}
.step.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--card);border-radius:20px;padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
h1{font-size:1.7rem;margin:.1em 0 .5em}
h2{font-size:1.32rem;color:var(--primary-d);margin-top:1.4em}
h3{font-size:1.08rem;color:var(--accent)}
.kicker{color:var(--accent);font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:.78rem}
p{margin:.6em 0}ul{margin:.4em 0 .4em 1.1em}li{margin:.3em 0}
.lat-word{color:var(--lat);font-weight:700}.lon-word{color:var(--lon);font-weight:700}
.box{border-radius:16px;padding:16px 18px;margin:16px 0;border-left:6px solid var(--primary)}
.box.info{background:#eef4fc;border-color:var(--primary)}
.box.tip{background:#eafaf6;border-color:var(--accent)}
.box.def{background:#fff7ea;border-color:var(--gold)}
.box h4{margin:.1em 0 .4em;font-size:1rem}
.globe-wrap{position:relative;width:100%;max-width:480px;margin:10px auto;aspect-ratio:1/1;
  background:radial-gradient(circle at 35% 30%,#f4f8fd,#d7e3f2);border-radius:24px;overflow:hidden;
  box-shadow:inset 0 0 40px rgba(60,90,140,.18);touch-action:none}
.globe-wrap canvas{display:block;width:100%;height:100%}
.globe-label{position:absolute;transform:translate(-50%,-130%);background:rgba(39,50,74,.92);color:#fff;
  padding:4px 10px;border-radius:10px;font-size:.85rem;font-weight:700;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 10px rgba(0,0,0,.25)}
.globe-label.lat{background:var(--lat)}
.globe-label.lon{background:var(--lon)}
.globe-label.coord{background:var(--gold);color:#3a2e00}
.globe-static-label{position:absolute;transform:translate(-50%,-50%);font-size:.72rem;font-weight:800;
  pointer-events:none;white-space:nowrap;z-index:2;
  text-shadow:0 1px 2px rgba(255,255,255,.95),0 0 4px rgba(255,255,255,.95),0 0 4px rgba(255,255,255,.95)}
.globe-static-label.lat{color:#c0432a}
.globe-static-label.lon{color:#2f6fd0}
.globe-ctrl{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.readout{background:#f3f6fb;border-radius:12px;padding:10px 14px;text-align:center;font-weight:600;margin:8px auto;max-width:480px;min-height:46px}
.readout small{color:var(--muted);font-weight:500;display:block}
.readout.measure{background:#fff7ea;border:1px solid #f0dca5}
button.btn{border:none;background:var(--primary);color:#fff;padding:9px 16px;border-radius:12px;
  font-weight:700;cursor:pointer;font-size:.95rem;transition:.15s;box-shadow:0 3px 8px rgba(40,60,90,.12)}
button.btn:hover{filter:brightness(.95)}
button.btn.ghost{background:#fff;color:var(--primary-d);border:2px solid var(--soft);box-shadow:none}
button.btn.accent{background:var(--accent)}
button.btn.gold{background:var(--gold);color:#3a2e00}
button.btn:disabled{opacity:.45;cursor:not-allowed}
.taskbox,.quizbox{background:#f7faff;border:1px solid var(--soft);border-radius:16px;padding:18px;margin:14px 0}
.boxhead{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--primary-d);margin-bottom:6px}
.boxhead .pts{margin-left:auto;background:var(--gold);color:#3a2e00;padding:2px 10px;border-radius:999px;font-size:.8rem;font-weight:800}
.progress{font-size:.85rem;color:var(--muted);font-weight:700;margin-bottom:8px}
.feedback{margin-top:10px;font-weight:700;min-height:1.2em}
.feedback.ok{color:var(--good)}.feedback.no{color:var(--bad)}.feedback.hint{color:#b9821a}
.opt{display:block;padding:10px 13px;border:2px solid var(--soft);border-radius:10px;margin:7px 0;cursor:pointer;transition:.12s;background:#fff}
.opt:hover{border-color:var(--primary)}
.opt.sel{border-color:var(--primary);background:#eef4fc}
.opt.correct{border-color:var(--good);background:#e7f7f3}
.opt.wrong{border-color:var(--bad);background:#fdeee9}
.qtext{font-weight:700;margin-bottom:8px}
input[type=text],input[type=number]{padding:9px 12px;border:2px solid var(--soft);border-radius:10px;font-size:1rem;width:220px;max-width:100%}
input.mini{width:80px}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px}
table.scores{width:100%;border-collapse:collapse;margin-top:10px}
table.scores th,table.scores td{padding:10px;text-align:left;border-bottom:1px solid var(--soft)}
table.scores th{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.03em}
.bar{height:10px;background:var(--soft);border-radius:999px;overflow:hidden;min-width:80px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:999px}
.badge-box{text-align:center;padding:26px;background:linear-gradient(135deg,#eef4fc,#eafaf6);border-radius:20px}
.badge-box .emoji{font-size:4rem}
.badge-box .title{font-size:1.6rem;font-weight:800;color:var(--primary-d);margin:6px 0}
.svgschema{display:block;margin:14px auto;max-width:340px;width:100%}
.locked-note{text-align:center;color:var(--muted);padding:40px 10px}
.locked-note .big{font-size:3rem}
.hint{font-size:.92rem;color:var(--muted)}
/* --- Lehrer-Zugang: Button + Modal --- */
.teacher-row{text-align:center;margin-top:22px}
.teacher-btn{display:inline-flex;align-items:center;gap:8px;background:#fff;border:2px dashed var(--soft);
  color:var(--muted);padding:9px 16px;border-radius:12px;font-weight:700;cursor:pointer;font-size:.9rem;transition:.15s}
.teacher-btn:hover{border-color:var(--primary);color:var(--primary-d)}
.modal-back{position:fixed;inset:0;background:rgba(20,30,50,.55);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-back.show{display:flex}
.modal-card{background:#fff;border-radius:20px;padding:26px 24px;max-width:420px;width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,.3);position:relative;animation:fade .25s ease}
.modal-card h2{margin-top:0;color:var(--primary-d)}
.modal-x{position:absolute;top:10px;right:14px;border:none;background:none;font-size:1.7rem;
  cursor:pointer;color:var(--muted);line-height:1}
.code-input{font-size:1.6rem;letter-spacing:.4em;text-align:center;width:100%;padding:12px;
  border:2px solid var(--soft);border-radius:12px;margin:10px 0}
.jump-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.jump-grid button{padding:14px 10px;border-radius:12px;border:2px solid var(--soft);background:#f7faff;
  font-weight:700;cursor:pointer;transition:.15s;font-size:.92rem;text-align:left}
.jump-grid button:hover{background:#eef4fc;filter:brightness(.97)}
/* --- Profi-Modul: innerer Stepper --- */
.profi-steps{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 18px}
.profi-dot{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;color:var(--muted);
  background:#fff;border:2px solid var(--soft);border-radius:999px;padding:5px 11px;cursor:pointer;
  transition:.2s;user-select:none;touch-action:manipulation}
.profi-dot .pn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
  border-radius:50%;background:var(--soft);color:#fff;font-size:.72rem}
.profi-dot.active{border-color:var(--primary);background:#eef4fc;color:var(--primary-d)}
.profi-dot.active .pn{background:var(--primary)}
.profi-dot.done .pn{background:var(--good)}
.profi-panel{display:none;animation:fade .3s ease}
.profi-panel.show{display:block}
.profi-ph{border:2px dashed #b8c4d6;border-radius:14px;padding:26px 16px;text-align:center;
  color:var(--muted);background:#f7faff;margin-top:8px}
.profi-foot{display:flex;justify-content:space-between;gap:10px;margin-top:18px}
.profi-foot .btn{flex:1;min-height:48px}
/* --- Profi Etappe 1: Problem-Karte --- */
.prob-svgwrap{background:radial-gradient(circle at 40% 30%,#fbfdff,#eef4fc);border-radius:16px;padding:10px;margin:14px 0;box-shadow:inset 0 0 24px rgba(60,90,140,.10)}
.prob-svg{display:block;width:100%;max-width:420px;margin:0 auto;height:auto}
/* --- Profi Etappe 2: 60er-Slider --- */
.profi-slider{-webkit-appearance:none;appearance:none;width:100%;max-width:420px;height:8px;border-radius:999px;
  background:linear-gradient(90deg,#e4572e,#e0a700);outline:none;margin:14px auto;display:block;cursor:pointer;touch-action:manipulation}
.profi-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;border-radius:50%;
  background:#fff;border:3px solid var(--gold);box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer}
.profi-slider::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid var(--gold);
  box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer}
.profi-slider:disabled{opacity:.4;cursor:not-allowed}
/* --- Profi Etappe 3: Dreisatz-Zeilen --- */
.ds-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:9px 13px;border-radius:10px;
  background:#f7faff;border:1px solid var(--soft);margin:7px 0;font-weight:600;
  opacity:0;transform:translateY(6px);transition:.45s ease}
.ds-row.in{opacity:1;transform:none}
.ds-row .ds-mm{color:#2f6fd0;font-weight:800}
.ds-row .ds-min{color:#c0432a;font-weight:800}
.ds-row.res{background:#fff7ea;border-color:#f0dca5;font-size:1.05rem;color:#3a2e00}
/* --- Profi Etappe 4: Eingabe-Zeile --- */
.sk-inputs{display:flex;flex-wrap:wrap;gap:16px;margin:8px 0}
.sk-inputs label{font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
/* --- Profi Etappe 5: Atlas-Messfelder --- */
.at-field{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#f7faff;border:1px solid var(--soft);
  border-radius:12px;padding:11px 14px;margin:9px 0;font-weight:600;font-size:.95rem}
.at-field .ic{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;
  background:var(--primary);color:#fff;font-size:.82rem;font-weight:800;flex:0 0 auto}
.at-field.lat .ic{background:var(--lat)}
.at-field.lon .ic{background:var(--lon)}
.at-field .at-txt{flex:1 1 55%;min-width:160px}
.at-field .at-num{margin-left:auto;display:flex;align-items:center;gap:6px;flex:0 0 auto;font-weight:700}
/* --- Karten-Modul (Abschnitt 5) --- */
.map-wrap{background:radial-gradient(circle at 40% 30%,#fbfdff,#eef4fc);border-radius:16px;padding:10px;margin:14px 0;box-shadow:inset 0 0 24px rgba(60,90,140,.10)}
.map-svg{display:block;width:100%;max-width:560px;margin:0 auto;height:auto;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.gline-lat{stroke:var(--lat);stroke-width:1.3;opacity:.5;cursor:pointer}
.gline-lon{stroke:var(--lon);stroke-width:1.3;opacity:.5;cursor:pointer}
.gline-lat.main,.gline-lon.main{opacity:.95;stroke-width:2.6}
.gline-lat.sel,.gline-lon.sel{stroke:var(--gold);stroke-width:3.8;opacity:1}
.ghit{stroke:transparent;stroke-width:18;pointer-events:stroke;cursor:pointer}
.glabel{font-size:11px;font-weight:700}
.gsub{font-size:9px;fill:#9aa7bd;font-weight:700}
.gwater{font-size:10px;fill:#9aa6bd;font-weight:800;letter-spacing:.08em}
.citydot{pointer-events:none;fill:var(--gold);stroke:#7a5b00;stroke-width:1.4}
.citydot.sel{fill:var(--primary);stroke:var(--primary-d)}
.citydot.ok{fill:var(--good);stroke:#1c6b60}
.citydot.bad{fill:var(--bad);stroke:#9e3b1f}
.cityname{font-size:10px;font-weight:800;fill:#5b4106;paint-order:stroke;stroke:#fffdf5;stroke-width:2.6px;pointer-events:none}
.readdot{fill:var(--gold);stroke:#7a5b00;stroke-width:1.6;pointer-events:none}
.readring{fill:none;stroke:var(--gold);stroke-width:2;opacity:.55;pointer-events:none}
@media(max-width:560px){body{font-size:16px}.card{padding:18px}h1{font-size:1.4rem}.profi-dot .pl{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">Koordinaten-Reise</div>
  <div class="score-pill">⭐ <b id="totalPts">0</b> / <span id="totalMax">0</span></div>
</header>
<div class="nav" id="nav"></div>
<main id="main"></main>

<script>
/* ====================== HELFER ====================== */
const latVals=[90,80,60,40,20,0,-20,-40,-60,-80,-90];
const lonVals=(()=>{const a=[];for(let l=-160;l<=180;l+=20)a.push(l);return a;})();
function fmtLatShort(v){if(v===0)return"0°";if(v===90)return"90°N";if(v===-90)return"90°S";return Math.abs(v)+"°"+(v>0?"N":"S");}
function fmtLonShort(v){if(v===0)return"0°";if(Math.abs(v)===180)return"180°";return Math.abs(v)+"°"+(v>0?"E":"W");}
function nearestLat(l){return latVals.reduce((a,b)=>Math.abs(b-l)<Math.abs(a-l)?b:a);}
function angDiff(a,b){return Math.abs(((a-b+540)%360)-180);}
function nearestLon(l){return lonVals.reduce((a,b)=>angDiff(b,l)<angDiff(a,l)?b:a);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function norm(s){return (s||"").toLowerCase().replace(/grad/g,"").replace(/[°'"′″\s]/g,"");}
function parseNum(s){const t=(s||"").replace(/[.\s]/g,"");const m=t.match(/\d+/);return m?parseInt(m[0],10):NaN;}
/* STRENGE Koordinatenprüfung: ° ist Pflicht, Breite (N/S) zuerst, dann Länge (E/W) */
function coordStrict(input,la,lo){
  const s=(input||"").trim().toLowerCase().replace(/grad/g,"°");
  if(!s.includes("°"))return false;
  const m=s.match(/^(\d{1,3})\s*°\s*([nsoew])\s*[,;]?\s*(\d{1,3})\s*°\s*([nsoew])$/);
  if(!m)return false;
  const map={o:"e"};
  let h1=map[m[2]]||m[2],h2=map[m[4]]||m[4];
  if(!"ns".includes(h1)||!"ew".includes(h2))return false;
  const latV=(h1==="n"?1:-1)*parseInt(m[1],10);
  const lonV=(h2==="e"?1:-1)*parseInt(m[3],10);
  return latV===la&&lonV===lo;
}

/* ====================== STATE ====================== */
const SECT=[
 {id:0,name:"Einstieg",color:"#3a7d7b"},
 {id:1,name:"Breitenkreise",color:"#e4572e"},
 {id:2,name:"Längenkreise",color:"#3a86ff"},
 {id:3,name:"Geografische Lage",color:"#8e5fd0"},
 {id:4,name:"Karte",color:"#2f9e7a"},
 {id:5,name:"Profi",color:"#7b5fd0"},
 {id:6,name:"Ergebnis",color:"#e0a700",result:true},
];
let state={pts:{},passed:{},awarded:{},skipped:{}};
function load(){try{const s=JSON.parse(localStorage.getItem("koordReise3"));if(s)state=Object.assign(state,s);}catch(e){}}
function save(){try{localStorage.setItem("koordReise3",JSON.stringify(state));}catch(e){}}
load();
if(!state.skipped)state.skipped={};
SECT.forEach(s=>{if(state.pts[s.id]==null)state.pts[s.id]=0;});
function award(id,sect,pts){if(state.awarded[id])return false;state.awarded[id]=true;
  if(state.skipped[sect])state.skipped[sect]=false; /* sobald Punkte erzielt werden, zählt der Abschnitt wieder */
  state.pts[sect]=(state.pts[sect]||0)+pts;save();updateTotals();return true;}
function totalPts(){return SECT.reduce((a,s)=>a+(state.skipped[s.id]?0:(state.pts[s.id]||0)),0);}
function totalMax(){return SECT.reduce((a,s)=>a+(state.skipped[s.id]?0:(s.max||0)),0);}
function updateTotals(){document.getElementById("totalPts").textContent=totalPts();document.getElementById("totalMax").textContent=totalMax();}

/* ====================== 3D GLOBUS ====================== */
function lonRad(v){return -v*Math.PI/180;}
function createGlobe(container,mode){
  if(typeof THREE==="undefined"){container.innerHTML="<div class='locked-note'>3D-Globus konnte nicht geladen werden (Internet?).</div>";return null;}
  const R=1,LINE=1.006,HI=1.02,MK=1.03;
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(42,1,0.001,20);cam.position.set(0,0,3.3);
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));container.appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0xffffff,.9));
  const dl=new THREE.DirectionalLight(0xffffff,.5);dl.position.set(2,1.5,3);scene.add(dl);
  const group=new THREE.Group();scene.add(group);
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(R,48,48),
     new THREE.MeshPhongMaterial({color:0xfdfefe,shininess:6,specular:0x445566}));
  group.add(sphere);

  const latPts={},lonPts={};
  function latPoints(v,f){const a=v*Math.PI/180,r=Math.cos(a)*R*f,y=Math.sin(a)*R*f,p=[];
    if(Math.abs(v)===90)return[new THREE.Vector3(0,y,0)];
    for(let t=0;t<=64;t++){const th=t/64*Math.PI*2;p.push(new THREE.Vector3(r*Math.cos(th),y,r*Math.sin(th)));}return p;}
  function lonPoints(v,f){const ang=lonRad(v),p=[];
    for(let t=-64;t<=64;t++){const la=t/64*Math.PI/2,r=Math.cos(la)*R*f;
      p.push(new THREE.Vector3(r*Math.cos(ang),Math.sin(la)*R*f,r*Math.sin(ang)));}return p;}
  function addLine(pts,color,wide){const g=new THREE.BufferGeometry().setFromPoints(pts);
    const l=new THREE.Line(g,new THREE.LineBasicMaterial({color,linewidth:wide?3:1}));group.add(l);return l;}
  function tubeLine(pts,radius,color){const curve=new THREE.CatmullRomCurve3(pts);
    const g=new THREE.TubeGeometry(curve,Math.max(8,pts.length),radius,8,false);
    return new THREE.Mesh(g,new THREE.MeshBasicMaterial({color}));}
  function latTorus(v,tube,color,f){const a=v*Math.PI/180,r=Math.max(Math.cos(a)*R*f,0.001);
    const m=new THREE.Mesh(new THREE.TorusGeometry(r,tube,10,60),new THREE.MeshBasicMaterial({color}));
    m.rotation.x=Math.PI/2;m.position.y=Math.sin(a)*R*f;return m;}
  function poleDot(v,size,color,f){const m=new THREE.Mesh(new THREE.SphereGeometry(size,16,16),new THREE.MeshBasicMaterial({color}));m.position.y=Math.sign(v)*R*f;return m;}

  if(mode==="lat"||mode==="both")latVals.forEach(v=>{latPts[v]=latPoints(v,LINE);
    if(v===0)group.add(latTorus(0,0.015,0xe4572e,LINE));
    else if(Math.abs(v)===90)group.add(poleDot(v,0.04,0xe4572e,LINE));
    else addLine(latPts[v],0xe4572e);});
  if(mode==="lon"||mode==="both")lonVals.forEach(v=>{lonPts[v]=lonPoints(v,LINE);
    if(v===0)group.add(tubeLine(lonPoints(0,LINE),0.015,0x3a86ff));else addLine(lonPts[v],0x3a86ff);});

  const hi={};
  function getHi(type,v){const k=type+":"+v;if(hi[k])return hi[k];let m;
    if(type==="lat"){if(Math.abs(v)===90)m=poleDot(v,0.06,0xe0a700,HI);else m=latTorus(v,0.024,0xe0a700,HI);}
    else m=tubeLine(lonPoints(v,HI),0.024,0xe0a700);
    m.visible=false;group.add(m);hi[k]=m;return m;}

  const marker=new THREE.Mesh(new THREE.SphereGeometry(.055,16,16),new THREE.MeshBasicMaterial({color:0xe0a700}));marker.visible=false;group.add(marker);
  const dot=new THREE.Mesh(new THREE.SphereGeometry(.06,18,18),new THREE.MeshBasicMaterial({color:0xe0a700}));dot.visible=false;group.add(dot);

  /* Startansicht: Nullmeridian (0°) zeigt nach vorne (zur Kamera) */
  group.rotation.set(0.32,-Math.PI/2,0);
  const api={selLat:[],selLon:[],locked:false,mode,onchange:null};

  /* --- Geometrie-Helfer für Positionen (lokal) --- */
  function pos(la,lo,f){const a=la*Math.PI/180,ang=lonRad(lo),r=Math.cos(a)*R*f;return new THREE.Vector3(r*Math.cos(ang),Math.sin(a)*R*f,r*Math.sin(ang));}
  function repLocal(pts){let best=null,bz=-9;pts.forEach(p=>{const w=p.clone();group.localToWorld(w);if(w.z>bz){bz=w.z;best=p;}});return best?best.clone():null;}

  /* --- Auswahl-Labels (mit Hintergrund) --- */
  const labels=[];
  function clearLabels(){labels.forEach(l=>l.el.remove());labels.length=0;}

  /* --- DAUERHAFTE Beschriftung aller Kreise (Schrift in Kreisfarbe) --- */
  const staticLabels=[];
  function makeStatic(local,text,cls){if(!local)return;const el=document.createElement("div");
    el.className="globe-static-label "+cls;el.textContent=text;container.appendChild(el);staticLabels.push({local,el});}
  /* Breiten-Globus: Labels am Nullmeridian (vorne); sonst leicht versetzt bei 10° */
  const ANCHOR_LON=(mode==="lat")?0:10;
  if(mode==="lat"||mode==="both")latVals.forEach(v=>makeStatic(pos(v,ANCHOR_LON,LINE+0.012),fmtLatShort(v),"lat"));
  if(mode==="lon"||mode==="both")lonVals.forEach(v=>makeStatic(pos(0,v,LINE+0.012),fmtLonShort(v),"lon"));

  let previewLat=null,previewLon=null;
  function buildLabels(){clearLabels();
    function add(local,text,cls){if(!local)return;const el=document.createElement("div");el.className="globe-label "+cls;el.textContent=text;container.appendChild(el);labels.push({local,el});}
    api.selLat.forEach(v=>add(repLocal(latPts[v]),fmtLatShort(v),"lat"));
    api.selLon.forEach(v=>add(repLocal(lonPts[v]),fmtLonShort(v),"lon"));
    if(previewLat!=null&&!api.selLat.includes(previewLat))add(repLocal(latPts[previewLat]),fmtLatShort(previewLat),"lat");
    if(previewLon!=null&&!api.selLon.includes(previewLon))add(repLocal(lonPts[previewLon]),fmtLonShort(previewLon),"lon");
    if(mode==="both"&&api.selLat.length&&api.selLon.length){
      add(pos(api.selLat[0],api.selLon[0],MK+0.06),fmtLatShort(api.selLat[0])+"  "+fmtLonShort(api.selLon[0]),"coord");}
  }
  function refresh(){
    for(const k in hi)hi[k].visible=false;
    api.selLat.forEach(v=>{getHi("lat",v).visible=true;});
    api.selLon.forEach(v=>{getHi("lon",v).visible=true;});
    if(mode==="both"&&api.selLat.length&&api.selLon.length){marker.position.copy(pos(api.selLat[0],api.selLon[0],MK));marker.visible=true;}else marker.visible=false;
    buildLabels();if(api.onchange)api.onchange();
  }
  const ray=new THREE.Raycaster(),m2=new THREE.Vector2();
  function pick(cx,cy){const r=renderer.domElement.getBoundingClientRect();
    m2.x=((cx-r.left)/r.width)*2-1;m2.y=-((cy-r.top)/r.height)*2+1;ray.setFromCamera(m2,cam);
    const hit=ray.intersectObject(sphere);if(!hit.length)return null;
    const lp=group.worldToLocal(hit[0].point.clone());
    const la=Math.asin(THREE.MathUtils.clamp(lp.y/R,-1,1))*180/Math.PI;
    const vlon=-Math.atan2(lp.z,lp.x)*180/Math.PI;
    const nl=nearestLat(la),no=nearestLon(vlon);
    if(mode==="lat")return{latV:nl,key:"a"+nl};
    if(mode==="lon")return{lonV:no,key:"o"+no};
    const dLat=Math.abs(la-nl),dLon=angDiff(vlon,no)*Math.cos(la*Math.PI/180);
    const primary=dLat<=dLon?"lat":"lon";
    return{latV:nl,lonV:no,primary,key:primary+(primary==="lat"?nl:no)};
  }
  function setPreview(p){previewLat=p.latV??null;previewLon=p.lonV??null;
    if(mode==="both"){if(p.primary==="lat")previewLon=null;else previewLat=null;}refresh();}
  function clearPreview(){previewLat=previewLon=null;}
  function toggle(arr,v){const i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);}
  function commit(p){
    if(mode==="lat")toggle(api.selLat,p.latV);
    else if(mode==="lon")toggle(api.selLon,p.lonV);
    else{if(p.primary==="lat")api.selLat=(api.selLat[0]===p.latV)?[]:[p.latV];
         else api.selLon=(api.selLon[0]===p.lonV)?[]:[p.lonV];}
    clearPreview();refresh();
  }
  let down=false,moved=false,lx,ly,idle=0;
  const el=renderer.domElement;el.style.cursor="grab";
  el.addEventListener("pointerdown",e=>{down=true;moved=false;lx=e.clientX;ly=e.clientY;el.setPointerCapture(e.pointerId);el.style.cursor="grabbing";idle=0;});
  el.addEventListener("pointermove",e=>{
    if(!down){if(e.pointerType==="mouse"&&!api.locked){const p=pick(e.clientX,e.clientY);if(p)setPreview(p);else{clearPreview();refresh();}}return;}
    const dx=e.clientX-lx,dy=e.clientY-ly;if(Math.abs(dx)+Math.abs(dy)>5)moved=true;
    group.rotation.y+=dx*0.008;group.rotation.x=Math.max(-1.4,Math.min(1.4,group.rotation.x+dy*0.008));lx=e.clientX;ly=e.clientY;});
  el.addEventListener("pointerup",e=>{down=false;el.style.cursor="grab";idle=0;if(moved||api.locked)return;
    const p=pick(e.clientX,e.clientY);if(!p)return;
    /* EIN Tipp/Klick wählt direkt aus – auch im Kombi-Globus (nächstgelegener Breiten- ODER Längenkreis) */
    commit(p);});
  el.addEventListener("touchcancel",()=>{down=false;});

  api.reset=function(){api.selLat=[];api.selLon=[];clearPreview();dot.visible=false;refresh();};
  api.northView=function(){group.rotation.set(Math.PI/2,0,0);};
  api.standardView=function(){group.rotation.set(0.32,-Math.PI/2,0);};
  api.showDot=function(la,lo){dot.position.copy(pos(la,lo,MK));dot.visible=true;};
  api.hideDot=function(){dot.visible=false;};
  function resize(){const w=container.clientWidth,h=container.clientHeight;if(!w||!h)return;renderer.setSize(w,h,false);cam.aspect=w/h;cam.updateProjectionMatrix();}
  function place(L,r){const v=L.local.clone();group.localToWorld(v);const p=v.clone().project(cam);
    if(v.distanceTo(cam.position)>cam.position.length()||p.z>1){L.el.style.display="none";return;}
    L.el.style.display="block";L.el.style.left=((p.x*.5+.5)*r.width)+"px";L.el.style.top=((-p.y*.5+.5)*r.height)+"px";}
  function frame(){requestAnimationFrame(frame);
    if(!down){idle++;if(idle>200)group.rotation.y+=0.0015;}
    const r=renderer.domElement.getBoundingClientRect();
    staticLabels.forEach(L=>place(L,r));
    labels.forEach(L=>place(L,r));
    renderer.render(scene,cam);}
  resize();refresh();frame();window.addEventListener("resize",resize);api._resize=resize;
  return api;
}

/* ====================== 2D AFRIKA-KARTE (Abschnitt 5) ====================== */

  const iW=VW-ML-MR,iH=VH-MT-MB;
  const px=lon=>ML+(lon-lonMin)/(lonMax-lonMin)*iW;
  const py=lat=>MT+(latMax-lat)/(latMax-latMin)*iH;
  const LATS=[-40,-30,-20,-10,0,10,20,30,40];
  const LONS=[-20,-10,0,10,20,30,40,50];
  const MAINLAND=[[-6,36],[2,37],[10,37],[20,33],[25,32],[32,31],[34,28],[37,22],[40,15],[43,12],[51,12],[49,4],[42,-2],[40,-11],[35,-18],[33,-26],[27,-33],[20,-35],[18,-34],[13,-17],[9,-1],[6,4],[-2,5],[-8,5],[-13,8],[-17,14],[-16,21],[-12,28],[-9,32],[-6,36]];

  const CITIES=[
    {n:"Casablanca",lo:-8,la:34,dx:7,a:"start"},
    {n:"Tripolis",lo:13,la:33,dx:7,a:"start"},
    {n:"Kairo",lo:31,la:30,dx:7,a:"start"},
    {n:"Dakar",lo:-17,la:15,dx:-7,a:"end"},
    {n:"Khartum",lo:33,la:16,dx:7,a:"start"},
    {n:"Addis Abeba",lo:39,la:9,dx:7,a:"start"},
    {n:"Lagos",lo:3,la:6,dx:7,a:"start"},
    {n:"Nairobi",lo:37,la:-1,dx:7,a:"start"},
    {n:"Kinshasa",lo:15,la:-4,dx:-7,a:"end"},
    {n:"Kapstadt",lo:18,la:-34,dx:7,a:"start"}

  const api={selLat:[],selLon:[],lastCity:null,onchange:null};
  const svg=E("svg");svg.setAttribute("viewBox","0 0 "+VW+" "+VH);svg.setAttribute("class","map-svg");container.appendChild(svg);
  const latEls={},lonEls={},cityEls={};

  const bg=E("rect");bg.setAttribute("x",ML);bg.setAttribute("y",MT);bg.setAttribute("width",iW);bg.setAttribute("height",iH);
  bg.setAttribute("fill","#eaf2fb");bg.setAttribute("stroke","#cbd5e1");svg.appendChild(bg);
  WATER.forEach(wl=>{const t=E("text");t.setAttribute("x",px(wl.lon));t.setAttribute("y",py(wl.lat));t.setAttribute("text-anchor","middle");t.setAttribute("class","gwater");t.textContent=wl.t;svg.appendChild(t);});
  const land=E("path");land.setAttribute("d",MAINLAND.map((p,i)=>(i?"L":"M")+px(p[0])+" "+py(p[1])).join(" ")+" Z");
  land.setAttribute("fill","#d9f0d2");land.setAttribute("stroke","#5b8c4f");land.setAttribute("stroke-width","1.5");svg.appendChild(land);
  const mada=E("path");mada.setAttribute("d",MADA.map((p,i)=>(i?"L":"M")+px(p[0])+" "+py(p[1])).join(" ")+" Z");
  mada.setAttribute("fill","#d9f0d2");mada.setAttribute("stroke","#5b8c4f");mada.setAttribute("stroke-width","1.5");svg.appendChild(mada);
  const af=E("text");af.setAttribute("x",px(20));af.setAttribute("y",py(3));af.setAttribute("text-anchor","middle");af.setAttribute("class","gwater");af.setAttribute("fill","#8ab27e");af.textContent="AFRIKA";svg.appendChild(af);

  LATS.forEach(v=>{
    const ln=E("line");ln.setAttribute("class","gline-lat"+(v===0?" main":""));
    ln.setAttribute("x1",ML);ln.setAttribute("x2",ML+iW);ln.setAttribute("y1",py(v));ln.setAttribute("y2",py(v));svg.appendChild(ln);latEls[v]=ln;
    const hit=E("line");hit.setAttribute("class","ghit");hit.setAttribute("x1",ML);hit.setAttribute("x2",ML+iW);hit.setAttribute("y1",py(v));hit.setAttribute("y2",py(v));
    hit.addEventListener("pointerdown",e=>{e.stopPropagation();toggleLat(v);});svg.appendChild(hit);
  });
  LONS.forEach(v=>{
    const ln=E("line");ln.setAttribute("class","gline-lon"+(v===0?" main":""));
    ln.setAttribute("y1",MT);ln.setAttribute("y2",MT+iH);ln.setAttribute("x1",px(v));ln.setAttribute("x2",px(v));svg.appendChild(ln);lonEls[v]=ln;
    const hit=E("line");hit.setAttribute("class","ghit");hit.setAttribute("y1",MT);hit.setAttribute("y2",MT+iH);hit.setAttribute("x1",px(v));hit.setAttribute("x2",px(v));
    hit.addEventListener("pointerdown",e=>{e.stopPropagation();toggleLon(v);});svg.appendChild(hit);
  });
  LATS.forEach(v=>{const y=py(v)+4;
    [[ML-9,"end"],[ML+iW+9,"start"]].forEach(([x,an])=>{const t=E("text");t.setAttribute("x",x);t.setAttribute("y",y);t.setAttribute("text-anchor",an);t.setAttribute("class","glabel");t.setAttribute("fill","#c0432a");t.textContent=fmtLatShort(v);svg.appendChild(t);});
  });
  LONS.forEach(v=>{
    [MT-9,MT+iH+17].forEach(yy=>{const t=E("text");t.setAttribute("x",px(v));t.setAttribute("y",yy);t.setAttribute("text-anchor","middle");t.setAttribute("class","glabel");t.setAttribute("fill","#2f6fd0");t.textContent=fmtLonShort(v);svg.appendChild(t);});

    hit.addEventListener("pointerdown",e=>{e.stopPropagation();selectCity(c.n);});svg.appendChild(hit);
    const dot=E("circle");dot.setAttribute("cx",px(c.lo));dot.setAttribute("cy",py(c.la));dot.setAttribute("r",5.5);dot.setAttribute("class","citydot");svg.appendChild(dot);cityEls[c.n]=dot;
    const lbl=E("text");lbl.setAttribute("x",px(c.lo)+c.dx);lbl.setAttribute("y",py(c.la)+3.5);lbl.setAttribute("text-anchor",c.a);lbl.setAttribute("class","cityname");lbl.textContent=c.n;svg.appendChild(lbl);
  });

  const dotG=E("g");dotG.style.display="none";
  const ring=E("circle");ring.setAttribute("r",10);ring.setAttribute("class","readring");
  const dd=E("circle");dd.setAttribute("r",5.5);dd.setAttribute("class","readdot");
  dotG.appendChild(ring);dotG.appendChild(dd);svg.appendChild(dotG);

  function toggleLat(v){const i=api.selLat.indexOf(v);if(i>=0)api.selLat.splice(i,1);else api.selLat.push(v);api.lastCity=null;clearCityCls();refresh();}
  function toggleLon(v){const i=api.selLon.indexOf(v);if(i>=0)api.selLon.splice(i,1);else api.selLon.push(v);api.lastCity=null;clearCityCls();refresh();}
  function clearCityCls(){Object.values(cityEls).forEach(d=>d.classList.remove("sel","ok","bad"));}
  function selectCity(n){api.lastCity=n;clearCityCls();cityEls[n].classList.add("sel");refresh();}

  function refresh(){
    LATS.forEach(v=>latEls[v].classList.toggle("sel",api.selLat.includes(v)));
    LONS.forEach(v=>lonEls[v].classList.toggle("sel",api.selLon.includes(v)));
    if(api.onchange)api.onchange();
  }
  api.refresh=refresh;
  api.reset=function(){api.selLat=[];api.selLon=[];api.lastCity=null;clearCityCls();dotG.style.display="none";refresh();};
  api.showDot=function(la,lo){dotG.setAttribute("transform","translate("+px(lo)+","+py(la)+")");dotG.style.display="block";};
  api.hideDot=function(){dotG.style.display="none";};
  api.markCity=function(n,ok){if(cityEls[n])cityEls[n].classList.add(ok?"ok":"bad");};
  refresh();
  return api;
}

/* ====================== AUFGABEN-SEQUENZ ====================== */
function renderTasks(host,sectId,tasks,onDone){
  host.innerHTML="";
  const head=document.createElement("div");head.className="boxhead";head.innerHTML='Aufgaben<span class="pts" id="tp_'+sectId+'"></span>';
  const prog=document.createElement("div");prog.className="progress";
  const body=document.createElement("div");
  host.append(head,prog,body);
  let i=0;
  function show(){
    while(i<tasks.length&&state.awarded["task-"+sectId+"-"+i])i++;
    if(i>=tasks.length){finish();return;}
    const t=tasks[i];let attempt=0;
    head.querySelector(".pts").textContent=t.points+" P";
    prog.textContent="Aufgabe "+(i+1)+" von "+tasks.length;
    body.innerHTML='<div class="qtext">'+t.q+'</div>'+(t.html||"");
    const fb=document.createElement("div");fb.className="feedback";
    const btn=document.createElement("button");btn.className="btn accent";btn.textContent="Prüfen";
    body.append(btn,fb);
    if(t.onStart)t.onStart(body);
    btn.onclick=()=>{
      const ok=t.check(body);
      if(ok){const pts=attempt===0?t.points:Math.ceil(t.points/2);
        const got=award("task-"+sectId+"-"+i,sectId,pts);
        fb.className="feedback ok";fb.textContent=(t.success||"Richtig!")+(got?(" +"+pts+" Punkte"):"");
        btn.textContent="Weiter →";btn.className="btn";btn.onclick=()=>{i++;show();};
      }else{attempt++;
        if(attempt===1){fb.className="feedback hint";fb.textContent="💡 "+t.hint;}
        else{fb.className="feedback no";fb.textContent="Noch nicht ganz – schau dir den Hinweis noch mal an: 💡 "+t.hint;}}
    };
  }
  function finish(){head.querySelector(".pts").style.display="none";prog.textContent="Alle Aufgaben gelöst ✓";
    body.innerHTML='<div class="feedback ok">Stark! Du hast alle Aufgaben geschafft.</div>';onDone&&onDone();}
  show();
}

/* ====================== QUIZ-ENGINE ====================== */
function renderQuiz(host,sectId,pool,count,onPass){
  host.innerHTML="";
  const head=document.createElement("div");head.className="boxhead";head.textContent="Quiz";
  const prog=document.createElement("div");prog.className="progress";
  const body=document.createElement("div");host.append(head,prog,body);
  let bag=shuffle(pool.slice()),lastQ=null,slot=0;
  function draw(){if(bag.length===0)bag=shuffle(pool.slice());let q=bag.shift();
    if(q===lastQ&&bag.length){bag.push(q);q=bag.shift();}lastQ=q;return q;}
  function next(){
    if(slot>=count){prog.textContent="Quiz abgeschlossen ✓";
      body.innerHTML='<div class="feedback ok">🎉 Geschafft! Du kannst zum nächsten Abschnitt.</div>';onPass&&onPass();return;}
    render(draw(),0);
  }
  function render(q,attempt){
    prog.textContent="Frage "+(slot+1)+" von "+count;
    body.innerHTML='<div class="qtext">'+q.q+'</div>';
    let sel=null,inp=null;
    if(q.type==="input"){inp=document.createElement("input");inp.type="text";
      inp.placeholder=q.coord?"z. B. 12°S 30°W":"Antwort…";body.appendChild(inp);}
    else{q.options.forEach((op,oi)=>{const o=document.createElement("label");o.className="opt";o.textContent=op;
      o.onclick=()=>{[...body.querySelectorAll(".opt")].forEach(c=>c.classList.remove("sel"));o.classList.add("sel");sel=oi;};body.appendChild(o);});}
    const fb=document.createElement("div");fb.className="feedback";
    const btn=document.createElement("button");btn.className="btn accent";btn.textContent="Antworten";
    body.append(btn,fb);
    btn.onclick=()=>{
      let ok;
      if(q.type==="input"){
        if(q.coord)ok=coordStrict(inp.value,q.coord[0],q.coord[1]);
        else ok=q.answer.some(a=>norm(a)===norm(inp.value));
      }else ok=sel===q.answer;
      if(ok){const pts=attempt===0?10:5;const got=award("q-"+sectId+"-"+slot,sectId,pts);
        fb.className="feedback ok";fb.textContent="Richtig!"+(got?(" +"+pts+" Punkte"):"");
        if(q.type!=="input"&&sel!=null)body.querySelectorAll(".opt")[sel].classList.add("correct");
        btn.textContent="Weiter →";btn.className="btn";btn.onclick=()=>{slot++;next();};
      }else{
        if(q.type!=="input"&&sel!=null)body.querySelectorAll(".opt")[sel].classList.add("wrong");
        attempt++;
        if(attempt===1){fb.className="feedback hint";fb.textContent="💡 "+q.hint+" – versuch es nochmal.";}
        else{fb.className="feedback no";fb.textContent="Leider wieder falsch. Du bekommst eine neue Frage…";
          setTimeout(()=>render(draw(),0),1100);}
      }
    };
  }
  next();
}

/* ====================== NAV / RENDER ====================== */
let current=0,teacherMode=false;const globes={},nextBtns={},flags={};
function maxUnlocked(){if(teacherMode)return SECT.length-1;let m=0;for(let i=1;i<SECT.length;i++){if(state.passed[i-1]||state.skipped[i-1]||SECT[i-1].soon||SECT[i-1].result)m=i;else break;}return m;}
function buildNav(){const nav=document.getElementById("nav");nav.innerHTML="";
  SECT.forEach(s=>{const b=document.createElement("button");b.textContent=s.name;
    const open=s.id===0||s.id<=maxUnlocked();const active=s.id===current;
    b.style.color=active?"#fff":s.color;b.style.background=active?s.color:s.color+"1e";b.style.borderColor=s.color;
    if(state.passed[s.id])b.classList.add("done");
    if(!open)b.classList.add("locked");
    b.onclick=()=>{if(open)show(s.id);};nav.appendChild(b);});}
function markPassed(id){state.passed[id]=true;save();buildNav();}
function sectFlag(id,which){flags[id]=flags[id]||{};flags[id][which]=true;
  const need=id===0?["quiz"]:["tasks","quiz"];
  if(need.every(k=>flags[id][k])){markPassed(id);if(nextBtns[id])nextBtns[id].disabled=false;}}
/* Profi-Abschnitt überspringen: zählt nicht zur Wertung (Max + Punkte = 0) */
function skipProfi(){
  if(!state.passed[5])state.skipped[5]=true;
  save();buildNav();updateTotals();
  if(nextBtns[5])nextBtns[5].disabled=false;
  show(6);
}
function show(id){current=id;buildNav();const main=document.getElementById("main");
  [...main.children].forEach(c=>c.classList.remove("show"));
  let el=document.getElementById("step"+id);
  if(!el){el=builders[id]();el.id="step"+id;el.className="step";main.appendChild(el);}
  el.classList.add("show");window.scrollTo(0,0);if(globes[id])setTimeout(()=>globes[id]._resize(),60);}
function footer(id){const f=document.createElement("div");f.className="foot";
  const back=document.createElement("button");back.className="btn ghost";back.textContent="← Zurück";
  back.onclick=()=>show(Math.max(0,id-1));back.style.visibility=id===0?"hidden":"visible";
  const right=document.createElement("div");right.style.display="flex";right.style.gap="10px";right.style.flexWrap="wrap";
  if(id===5){const skip=document.createElement("button");skip.className="btn ghost";skip.textContent="Überspringen";
    skip.onclick=()=>skipProfi();right.appendChild(skip);}
  const next=document.createElement("button");next.className="btn";next.textContent="Weiter →";
  next.onclick=()=>show(id+1);next.disabled=!state.passed[id];nextBtns[id]=next;

const TEACHER_CODE="4711";
function setupTeacherModal(){
  const m=document.createElement("div");m.className="modal-back";m.id="teacherModal";
  m.innerHTML=`<div class="modal-card">
    <button class="modal-x" id="tmClose" aria-label="Schließen">×</button>
    <div id="tmCode">
      <h2>👩‍🏫 Lehrer-Zugang</h2>
      <p class="hint">Gib den Zugangscode ein, um direkt zu einer Etappe zu springen.</p>
      <input type="password" inputmode="numeric" class="code-input" id="tmInput" placeholder="••••" maxlength="6" autocomplete="off">
      <div class="feedback no" id="tmErr"></div>
      <button class="btn" id="tmGo" style="width:100%">Freischalten</button>
    </div>
    <div id="tmJump" hidden>
      <h2>Direkt zu einer Etappe</h2>
      <p class="hint">Alle Abschnitte sind jetzt freigeschaltet. Wähle dein Ziel:</p>
      <div class="jump-grid" id="tmGrid"></div>
    </div>
  </div>`;
  document.body.appendChild(m);
  const codeView=m.querySelector("#tmCode"),jumpView=m.querySelector("#tmJump");
  const input=m.querySelector("#tmInput"),err=m.querySelector("#tmErr");
  function close(){m.classList.remove("show");}
  m.querySelector("#tmClose").onclick=close;
  m.addEventListener("click",e=>{if(e.target===m)close();});
  function buildGrid(){const grid=m.querySelector("#tmGrid");grid.innerHTML="";
    SECT.forEach(s=>{const b=document.createElement("button");
      b.textContent=(s.id+1)+". "+s.name;b.style.borderColor=s.color;b.style.color=s.color;
      b.onclick=()=>{close();show(s.id);};grid.appendChild(b);});}
  function showJump(){codeView.hidden=true;jumpView.hidden=false;buildGrid();}
  function showCode(){codeView.hidden=false;jumpView.hidden=true;err.textContent="";input.value="";}
  function check(){
    if(input.value.trim()===TEACHER_CODE){teacherMode=true;buildNav();showJump();}
    else{err.textContent="Falscher Code.";input.value="";input.focus();}
  }
  m.querySelector("#tmGo").onclick=check;
  input.addEventListener("keydown",e=>{if(e.key==="Enter")check();});
  window.openTeacher=()=>{
    if(teacherMode)showJump();else showCode();
    m.classList.add("show");setTimeout(()=>{if(!teacherMode)input.focus();},60);
  };
}

      <p>Jetzt arbeitest du mit deinem <b>echten Atlas</b>. Schlage die <b>physische Übersichtskarte von Afrika</b>
      auf, lege dein <b>Lineal</b> an und miss die geforderten Strecken in <b>Millimetern</b>. Trage deine Messwerte
      ein – den <b>Dreisatz</b> rechnet das Programm dann automatisch für dich. Danach rechnest du selbst die
      Minuten zum Hauptkreis und trägst die fertige Koordinate ein.</p>

       <b>1.</b> Suche die in der Aufgabe genannte Übersichtskarte in deinem Atlas. &nbsp;
       <b>2.</b> Lege das Lineal an die Gradlinien und miss in ganzen mm. &nbsp;
       <b>3.</b> Trage die vier Messwerte ein und drücke auf <b>Überprüfen</b>. &nbsp;

   const stepsEl=w.querySelector("#pSteps");

   const prev=w.querySelector("#pPrev"),next=w.querySelector("#pNext");

     d.innerHTML='<span class="pn">'+(i+1)+'</span><span class="pl">'+lab+'</span>';

   function go(i){

     const sx=parseFloat(circle.getAttribute("cx")),sy=parseFloat(circle.getAttribute("cy"));

     function step(t){let k=Math.min(1,(t-t0)/dur);k=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
       const cx=sx+(x-sx)*k,cy=sy+(y-sy)*k;

         fb2.className="feedback ok";
         fb2.textContent="Perfekt: "+ex.name+" liegt bei "+latDeg+"°"+latMin+"′"+latHemi+"  "+lonDeg+"°"+lonMin+"′"+lonHemi+(got?(" +"+cpts+" Punkte"):"");
         btn2.textContent="Nächste Aufgabe →";btn2.className="btn";btn2.onclick=()=>{ati++;atShow();};
         profiCheckDone();
       }else{
         attempt2++;
         if(attempt2===1){fb2.className="feedback hint";
           fb2.textContent="💡 Teile die Minuten durch 60 und trage sie vom kleinsten Hauptkreis aus ab: Breite vom "+ex.latRefLabel+" "+ex.latDir+", Länge vom "+ex.lonRefLabel+" "+ex.lonDir+".";}
         else{fb2.className="feedback no";
           fb2.textContent="Noch nicht. Breite: "+latArc+"′ = "+Math.floor(latArc/60)+"°"+(latArc%60)+"′ "+ex.latDir+" von "+ex.latRefLabel+" → "+latDeg+"°"+latMin+"′"+latHemi+". Länge: "+lonArc+"′ = "+Math.floor(lonArc/60)+"°"+(lonArc%60)+"′ "+ex.lonDir+" von "+ex.lonRefLabel+" → "+lonDeg+"°"+lonMin+"′"+lonHemi+".";}
       }
     };
   }
   function atShow(){
     while(ati<atlasEx.length&&state.awarded["profi5-"+ati+"-m"]&&state.awarded["profi5-"+ati+"-c"])ati++;
     if(ati>=atlasEx.length){atFinish();return;}
     const ex=atlasEx[ati];let attempt=0;
     atPtsEl.style.display="";atPtsEl.textContent=ex.pts+" P";
     atProg.textContent="Aufgabe "+(ati+1)+" von "+atlasEx.length;
     atGiven.innerHTML='<div class="box info" style="margin:10px 0"><h4>📍 Rechne die geografische Lage von '+ex.name+'</h4>'+
       'Schlage in deinem Atlas die <b>'+ex.map+'</b> auf. '+ex.name+' liegt zwischen <b>'+ex.latBracket+'</b> und zwischen <b>'+ex.lonBracket+'</b>.<br>'+
       '• Kleinster <b style="color:#c0432a">Breitenkreis</b>: <b>'+ex.latRefLabel+'</b> ('+ex.name+' liegt '+ex.latDir+' davon)<br>'+
       '• Kleinster <b style="color:#2f6fd0">Längenkreis</b>: <b>'+ex.lonRefLabel+'</b> ('+ex.name+' liegt '+ex.lonDir+' davon)</div>';
     atForm.innerHTML=
       '<p class="hint" style="margin:4px 0 8px"><b>📏 Deine Lineal-Messung</b> (in ganzen mm eintragen):</p>'+
       '<div class="at-field lat"><span class="ic">1</span><span class="at-txt">Abstand der beiden Breitenkreise ('+ex.latBracket+')</span><span class="at-num"><input type="number" id="atLatTot" class="mini"> mm</span></div>'+
       '<div class="at-field lon"><span class="ic">2</span><span class="at-txt">Abstand der beiden Längenkreise ('+ex.lonBracket+')</span><span class="at-num"><input type="number" id="atLonTot" class="mini"> mm</span></div>'+
       '<div class="at-field lat"><span class="ic">3</span><span class="at-txt">Abstand '+ex.name+' ↔ kleinster Breitenkreis ('+ex.latRefLabel+')</span><span class="at-num"><input type="number" id="atLatPart" class="mini"> mm</span></div>'+
       '<div class="at-field lon"><span class="ic">4</span><span class="at-txt">Abstand '+ex.name+' ↔ kleinster Längenkreis ('+ex.lonRefLabel+')</span><span class="at-num"><input type="number" id="atLonPart" class="mini"> mm</span></div>';
     atSolution.innerHTML="";
     const fb=document.createElement("div");fb.className="feedback";
     const btn=document.createElement("button");btn.className="btn accent";btn.textContent="Überprüfen";
     atForm.append(btn,fb);
     btn.onclick=()=>{
       const lt=parseFloat(w.querySelector("#atLatTot").value);
       const lo=parseFloat(w.querySelector("#atLonTot").value);
       const lp=parseFloat(w.querySelector("#atLatPart").value);
       const op=parseFloat(w.querySelector("#atLonPart").value);
       if([lt,lo,lp,op].some(v=>isNaN(v))){fb.className="feedback hint";fb.textContent="💡 Bitte fülle alle vier Felder mit deinen Messwerten aus.";return;}
       const TOL=3,wrong=[];
       if(Math.abs(lt-ex.latTot)>TOL)wrong.push("1");
       if(Math.abs(lo-ex.lonTot)>TOL)wrong.push("2");
       if(Math.abs(lp-ex.latPart)>TOL)wrong.push("3");
       if(Math.abs(op-ex.lonPart)>TOL)wrong.push("4");
       if(wrong.length===0){
         const mpts=attempt===0?Math.round(ex.pts/2):Math.ceil(ex.pts/4);
         const got=award("profi5-"+ati+"-m",5,mpts);
         fb.className="feedback ok";fb.textContent="Richtig gemessen! ✓ Hier ist dein Dreisatz:"+(got?(" +"+mpts+" Punkte"):"");
         atSolution.innerHTML=atDreisatz(ex,lt,lo,lp,op);atAnimate();
         btn.disabled=true;
         ["atLatTot","atLonTot","atLatPart","atLonPart"].forEach(id=>{const e2=w.querySelector("#"+id);if(e2)e2.disabled=true;});
         const rows=atSolution.querySelectorAll(".ds-row").length;
         setTimeout(()=>buildPhaseB(ex,lt,lo,lp,op),120+rows*300+300);
         profiCheckDone();
       }else{
         attempt++;
         fb.className="feedback no";
         fb.textContent="Noch nicht ganz – prüfe deine Messung bei Feld "+wrong.join(", ")+". Tipp: Lineal genau an die Gradlinien anlegen und in ganzen Millimetern ablesen (Toleranz ±3 mm).";
       }
     };
   }
   function atFinish(){
     atPtsEl.style.display="none";atProg.textContent="Alle Atlas-Aufgaben gelöst ✓";
     atGiven.innerHTML="";atSolution.innerHTML="";
     atForm.innerHTML='<div class="feedback ok">Glückwunsch – du beherrschst die Atlas-Methode mit Dreisatz! 🧭</div>';
   }
   atShow();

   /* --- Bestehen des Profi-Abschnitts: ALLE Aufgaben aus Übung UND Atlas (Messung + Koordinate) --- */
   function profiCheckDone(){
     let done=true;
     for(let i=0;i<skEx.length;i++)if(!state.awarded["profi4-"+i])done=false;
     for(let i=0;i<atlasEx.length;i++)if(!state.awarded["profi5-"+i+"-m"]||!state.awarded["profi5-"+i+"-c"])done=false;
     if(done){markPassed(5);if(nextBtns[5])nextBtns[5].disabled=false;}
   }
   profiCheckDone();
 },30);
 return w;
};

function renderResult(host){const tp=totalPts(),tm=totalMax(),pc=tm?Math.round(tp/tm*100):0;
  let emoji="⚓",title="Matrose";
  if(pc>=90){emoji="🧭";title="Koordinaten-Kapitän";}else if(pc>=70){emoji="🧭";title="Navigator";}
  else if(pc>=50){emoji="🗺️";title="Entdecker";}
  let rows="";SECT.filter(s=>!s.result).forEach(s=>{if((s.max||0)===0)return;
    if(state.skipped[s.id]){
      rows+=`<tr><td>${s.name}</td><td class="hint">übersprungen</td><td><div class="bar"></div></td><td class="hint">Nicht bearbeitet – zählt nicht zur Wertung.</td></tr>`;return;}
    const p=state.pts[s.id]||0,mx=s.max,perc=mx?Math.round(p/mx*100):0;
    const advice=perc>=70?"Sehr gut!":(perc>0?"Wiederhole die Theorie dieses Abschnitts.":"Noch nicht bearbeitet.");
    rows+=`<tr><td>${s.name}</td><td>${p} / ${mx}</td><td><div class="bar"><i style="width:${perc}%"></i></div></td><td class="hint">${advice}</td></tr>`;});
  const skipNote=state.skipped[5]?`<p class="hint" style="text-align:center">ℹ️ Der Profi-Abschnitt wurde übersprungen und zählt nicht zur Höchstpunktzahl.</p>`:"";
  host.innerHTML=`<div class="kicker">Ergebnis</div><h1>Deine Auswertung</h1>
   <div class="badge-box"><div class="emoji">${emoji}</div><div class="title">${title}</div>
    <p>Du hast <b>${tp}</b> von <b>${tm}</b> Punkten erreicht (${pc}%).</p></div>
   ${skipNote}
   <h2>Punkte pro Abschnitt</h2>
   <table class="scores"><tr><th>Abschnitt</th><th>Punkte</th><th>Fortschritt</th><th>Tipp</th></tr>${rows}</table>
   <div class="foot"><button class="btn ghost" onclick="show(0)">↩ Zur Reise</button>
    <button class="btn" onclick="resetAll()">Fortschritt zurücksetzen</button></div>`;}
