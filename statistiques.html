<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App-Statistik</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      margin: 0;
      padding: 1.5rem;
      color: #18181b;
    }
    .card {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      padding: 1.75rem;
    }
    h1 { font-size: 1.4rem; margin: 0 0 1.25rem; }
    .row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    input {
      flex: 1;
      padding: 0.7rem 0.9rem;
      border: 1px solid #d4d4d8;
      border-radius: 10px;
      font-size: 1rem;
    }
    button {
      padding: 0.7rem 1.2rem;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .msg { color: #dc2626; font-size: 0.9rem; margin-bottom: 1rem; min-height: 1.2rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.7rem 0.5rem; border-bottom: 1px solid #e4e4e7; }
    th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.03em; color: #71717a; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
    .total { font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📊 App-Statistik</h1>
    <div class="row">
      <input type="password" id="pw" placeholder="Lehrer-Passwort" />
      <button id="load">Abrufen</button>
    </div>
    <div class="msg" id="msg"></div>
    <table>
      <thead>
        <tr><th>App</th><th style="text-align:right">Öffnungen</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    const BASE = "https://appkarikaturanalyse-production.up.railway.app";
    const btn = document.getElementById("load");
    const pwInput = document.getElementById("pw");
    const msg = document.getElementById("msg");
    const tbody = document.getElementById("tbody");

    async function loadStats() {
      msg.textContent = "";
      tbody.innerHTML = "";
      const pw = pwInput.value.trim();
      if (!pw) { msg.textContent = "Bitte Passwort eingeben."; return; }

      btn.disabled = true;
      btn.textContent = "Lädt…";
      try {
        const res = await fetch(BASE + "/api/stats", {
          headers: {
            "x-teacher-password": pw
          }
        });
        if (res.status === 401 || res.status === 403) {
          msg.textContent = "Falsches Passwort.";
          return;
        }
        if (!res.ok) {
          msg.textContent = "Fehler beim Abruf (" + res.status + ").";
          return;
        }
        const data = await res.json();
        renderTable(data);
      } catch (e) {
        msg.textContent = "Verbindung fehlgeschlagen.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Abrufen";
      }
    }

    function renderTable(rows) {
      // Erwartet Array: [ { app_id: "zeitzonen", count: 42 }, ... ]
      if (!Array.isArray(rows) || rows.length === 0) {
        msg.textContent = "Noch keine Daten vorhanden.";
        return;
      }
      let total = 0;
      for (const row of rows) {
        const count = Number(row.count) || 0;
        total += count;
        const tr = document.createElement("tr");
        tr.innerHTML = "<td>" + row.app_id + "</td><td class='num'>" + count + "</td>";
        tbody.appendChild(tr);
      }
      const trTotal = document.createElement("tr");
      trTotal.className = "total";
      trTotal.innerHTML = "<td>Gesamt</td><td class='num'>" + total + "</td>";
      tbody.appendChild(trTotal);
    }

    btn.addEventListener("click", loadStats);
    pwInput.addEventListener("keydown", (e) => { if (e.key === "Enter") loadStats(); });
  </script>
</body>
</html>
