<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Lernapps</title>
<style>
  :root {
    --akzent: #16a34a;
    --akzent-hell: #22c55e;
    --pastellgruen: #d7f0dd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    color: #1e293b;
    background: var(--pastellgruen);
  }

  /* ===== BANNER OBEN (Bild + Schriftzug) ===== */
  .banner {
    position: relative;
    width: 100%;
    height: 20vh;          /* max. 20% der Bildschirmhöhe */
    max-height: 220px;     /* Begrenzung für große Monitore */
    min-height: 120px;     /* damit der Text auf Handys lesbar bleibt */
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    /* HINTERGRUNDBILD: Ersetze die URL durch deinen Dateinamen,
       z.B. background-image: url('banner.jpg');
       Standard ist ein Farbverlauf, falls du (noch) kein Bild hast. */
    background-image: url('banner.jpg');
    background-size: cover;
    background-position: center;
  }

  /* Dunkler Schleier, damit weiße Schrift auf jedem Bild lesbar bleibt */
  .banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.32);
  }

  .banner-text {
    position: relative;
    z-index: 1;
    text-align: center;
    color: #fff;
    padding: 0 16px;
  }

  .banner-text h1 {
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.45);
  }

  .banner-text p {
    margin-top: 6px;
    font-size: clamp(0.85rem, 2.4vw, 1.05rem);
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    opacity: 0.95;
  }

  /* ===== INHALTSBEREICH ===== */
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 16px 60px;
  }

  .liste {
    display: grid;
    gap: 16px;
  }

  .karte {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #ffffff;
    border-radius: 16px;
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 4px 14px rgba(22, 101, 52, 0.12);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    border: 1px solid rgba(22, 163, 74, 0.15);
  }

  .karte:hover, .karte:focus-visible {
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(22, 101, 52, 0.22);
    outline: none;
  }

  .icon {
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--akzent), var(--akzent-hell));
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
  }

  .text { flex-grow: 1; min-width: 0; }

  .text h2 {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .text p {
    font-size: 0.9rem;
    color: #64748b;
    line-height: 1.4;
  }

  .pfeil {
    flex-shrink: 0;
    color: var(--akzent);
    font-size: 1.4rem;
    transition: transform 0.18s ease;
  }

  .karte:hover .pfeil { transform: translateX(4px); }

  footer {
    text-align: center;
    color: #4b7256;
    font-size: 0.85rem;
    margin-top: 40px;
  }

  @media (max-width: 480px) {
    .karte { padding: 14px 16px; gap: 12px; }
    .icon { width: 44px; height: 44px; font-size: 1.25rem; }
    .text h2 { font-size: 1.02rem; }
  }
</style>
</head>
<body>

  <!-- ===== BANNER ===== -->
  <div class="banner">
    <div class="banner-text">
      <h1>Meine Lernapps</h1>
      <p>Interaktive Lernanwendungen – einfach anklicken und loslegen.</p>
    </div>
  </div>

  <!-- ===== INHALT ===== -->
  <div class="container">
    <main class="liste" id="liste"></main>

    <footer>
      <p>© 2026 · Erstellt für den Unterricht</p>
    </footer>
  </div>

<script>
  /* =========================================================
     HIER DEINE APPS EINTRAGEN
     ---------------------------------------------------------
     datei   = der echte Dateiname (z.B. "jahreszeiten.html")
     titel   = der angezeigte Name (frei wählbar)
     text    = kurze Beschreibung (optional, "" für keine)
     icon    = Buchstabe oder Emoji für das Symbol (optional)
     ========================================================= */
  const apps = [
    {
      datei: "jahreszeiten.html",
      titel: "Die Jahreszeiten",
      text: "Interaktives 3D-Modell zur Entstehung der Jahreszeiten.",
      icon: "🌍"
    },
    {
      datei: "mondphasen.html",
      titel: "Mondphasen",
      text: "Erkunde die acht Phasen des Mondes mit Schieberegler.",
      icon: "🌙"
    },
    {
      datei: "beispiel.html",
      titel: "Weitere Lernapp",
      text: "Hier kannst du eine Beschreibung einfügen.",
      icon: "📘"
    }
  ];

  /* --- Ab hier nichts mehr ändern --- */
  const liste = document.getElementById("liste");

  apps.forEach(app => {
    const a = document.createElement("a");
    a.className = "karte";
    a.href = app.datei;

    const icon = document.createElement("div");
    icon.className = "icon";
    icon.textContent = app.icon || "📄";

    const text = document.createElement("div");
    text.className = "text";

    const h2 = document.createElement("h2");
    h2.textContent = app.titel;
    text.appendChild(h2);

    if (app.text) {
      const p = document.createElement("p");
      p.textContent = app.text;
      text.appendChild(p);
    }

    const pfeil = document.createElement("div");
    pfeil.className = "pfeil";
    pfeil.textContent = "→";

    a.appendChild(icon);
    a.appendChild(text);
    a.appendChild(pfeil);
    liste.appendChild(a);
  });
</script>
</body>
</html>
