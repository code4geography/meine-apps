<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Klimazonen – Lernreise</title>
<style>
:root{
--bg:#eef3f9;--card:#fff;--ink:#27324a;--muted:#67738c;
--primary:#3f6fb5;--primary-d:#345a93;--accent:#2a9d8f;
--warm:#e0843a;--cool:#3a86ff;--green:#5a9e2f;--gold:#e0a700;
--good:#2a9d8f;--bad:#e4572e;--soft:#dde6f2;
--shadow:0 8px 24px rgba(40,60,90,.10);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
background:linear-gradient(160deg,#eaf1fb,#eef6f3);color:var(--ink);font-size:18px;line-height:1.55;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
border-bottom:1px solid var(--soft);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-weight:800;font-size:1.25rem;color:var(--primary-d)}
.score-pill{margin-left:auto;background:linear-gradient(135deg,var(--warm),var(--accent));color:#fff;
padding:8px 16px;border-radius:999px;font-weight:700;display:flex;gap:8px;align-items:center;box-shadow:var(--shadow)}
.score-pill b{font-size:1.15rem}
.nav{display:flex;gap:8px;overflow-x:auto;padding:10px 16px}
.nav button{flex:0 0 auto;border:2px solid transparent;padding:8px 16px;border-radius:12px;font-size:.95rem;
font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(40,60,90,.06);transition:.2s;white-space:nowrap}
.nav button.locked{opacity:.4;cursor:not-allowed}
.nav button.done::after{content:" ✓";font-weight:800}
main{max-width:920px;margin:0 auto;padding:18px 16px 80px}
.step{display:none;animation:fade .35s ease}
.step.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--card);border-radius:20px;padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
h1{font-size:1.7rem;margin:.1em 0 .5em}
h2{font-size:1.32rem;color:var(--primary-d);margin-top:1.4em}
h3{font-size:1.08rem;color:var(--accent)}
.kicker{color:var(--accent);font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:.78rem}
p{margin:.6em 0}ul{margin:.4em 0 .4em 1.1em}li{margin:.3em 0}
.box{border-radius:16px;padding:16px 18px;margin:16px 0;border-left:6px solid var(--primary)}
.box.info{background:#eef4fc;border-color:var(--primary)}
.box.tip{background:#eafaf6;border-color:var(--accent)}
.box.def{background:#fff7ea;border-color:var(--gold)}
.box h4{margin:.1em 0 .4em;font-size:1rem}
button.btn{border:none;background:var(--primary);color:#fff;padding:9px 16px;border-radius:12px;
font-weight:700;cursor:pointer;font-size:.95rem;transition:.15s;box-shadow:0 3px 8px rgba(40,60,90,.12)}
button.btn:hover{filter:brightness(.95)}
button.btn.ghost{background:#fff;color:var(--primary-d);border:2px solid var(--soft);box-shadow:none}
button.btn.accent{background:var(--accent)}
button.btn.gold{background:var(--gold);color:#3a2e00}
button.btn:disabled{opacity:.45;cursor:not-allowed}
.taskbox,.quizbox{background:#f7faff;border:1px solid var(--soft);border-radius:16px;padding:18px;margin:14px 0}
.boxhead{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--primary-d);margin-bottom:6px}
.boxhead .pts{margin-left:auto;background:var(--gold);color:#3a2e00;padding:2px 10px;border-radius:999px;font-size:.8rem;font-weight:800}
.progress{font-size:.85rem;color:var(--muted);font-weight:700;margin-bottom:8px}
.feedback{margin-top:10px;font-weight:700;min-height:1.2em}
.feedback.ok{color:var(--good)}.feedback.no{color:var(--bad)}.feedback.hint{color:#b9821a}
.opt{display:block;padding:10px 13px;border:2px solid var(--soft);border-radius:10px;margin:7px 0;cursor:pointer;transition:.12s;background:#fff}
.opt:hover{border-color:var(--primary)}
.opt.sel{border-color:var(--primary);background:#eef4fc}
.opt.correct{border-color:var(--good);background:#e7f7f3}
.opt.wrong{border-color:var(--bad);background:#fdeee9}
.qtext{font-weight:700;margin-bottom:8px}
input[type=text],input[type=number]{padding:9px 12px;border:2px solid var(--soft);border-radius:10px;font-size:1rem;width:220px;max-width:100%}
input.mini{width:80px}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px}
table.scores{width:100%;border-collapse:collapse;margin-top:10px}
table.scores th,table.scores td{padding:10px;text-align:left;border-bottom:1px solid var(--soft)}
table.scores th{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.03em}
.bar{height:10px;background:var(--soft);border-radius:999px;overflow:hidden;min-width:80px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:999px}
.badge-box{text-align:center;padding:26px;background:linear-gradient(135deg,#fff3e6,#eafaf6);border-radius:20px}
.badge-box .emoji{font-size:4rem}
.badge-box .title{font-size:1.6rem;font-weight:800;color:var(--primary-d);margin:6px 0}
.hint{font-size:.92rem;color:var(--muted)}
.profi-ph{border:2px dashed #b8c4d6;border-radius:14px;padding:26px 16px;text-align:center;
color:var(--muted);background:#f7faff;margin-top:16px;font-weight:700}
/* --- SVG-Illustration --- */
.illu-wrap{background:#f7faff;border:1px solid var(--soft);border-radius:16px;padding:14px;margin:14px 0}
.illu-wrap svg{width:100%;height:auto;display:block;border-radius:10px}
.illu-small{max-width:380px;margin:14px auto}
.illu-schema{max-width:700px;margin-left:auto;margin-right:auto}
.illu-globe{max-width:30rem;margin-left:auto;margin-right:auto}
.illu-cap{text-align:center;font-size:.85rem;color:var(--muted);font-weight:700;margin-top:8px}
/* --- Zuordnung: Einfallswinkel --- */
.match3{display:flex;gap:12px;flex-wrap:wrap;margin:14px 0}
.sit{flex:1 1 220px;min-width:200px;background:#f7faff;border:2px solid var(--soft);border-radius:16px;
padding:12px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:.12s}
.sit.target{border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,157,143,.18)}
.sit-head{font-weight:800;color:var(--primary-d);text-align:center;font-size:.95rem}
.sit-sub{font-size:.78rem;color:var(--muted);text-align:center;margin-top:-4px}
.sit-slot{border:2px dashed #c3cee0;border-radius:12px;background:#fff;display:flex;
align-items:center;justify-content:center;padding:8px;transition:.12s}
.sit-slot.line{min-height:96px}
.sit-slot.tile{min-height:118px}
.sit-slot .ph{color:#9fb0c8;font-size:.8rem;font-weight:700;pointer-events:none;text-align:center}
.match-pool{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0}
.pool-col{flex:1 1 260px;background:#fff7ea;border:2px dashed #f0dca5;border-radius:14px;padding:12px;cursor:pointer;transition:.12s}
.pool-col.target{border-color:var(--accent);background:#eafaf6}
.pool-col .pl{font-size:.82rem;font-weight:800;color:#b9821a;margin-bottom:8px;pointer-events:none}
.pool-items{display:flex;flex-direction:column;gap:8px;min-height:30px}
.pool-items .ph{color:#c6b486;font-size:.82rem;font-weight:700;font-style:italic}
.mitem{cursor:pointer;border-radius:10px;transition:.12s;width:100%;box-sizing:border-box}
.mitem.sel{box-shadow:0 0 0 3px var(--gold)}
.mitem.line-card{background:#fff;border:2px solid var(--soft);padding:6px;display:flex;align-items:center;justify-content:center}
.mitem.line-card svg{display:block;width:100%;max-width:170px;height:auto}
.mitem.tile-card{background:#fff;border:2px solid var(--soft);padding:10px 12px;font-size:.84rem;line-height:1.42;font-weight:600;color:var(--ink)}
.mitem.ok{border-color:var(--good)!important;background:#e7f7f3!important}
.mitem.bad{border-color:var(--bad)!important;background:#fdeee9!important}
/* --- Bereich 3: Detailkarte + Flip-Kacheln --- */
.kzmap-wrap{width:100%;background:#dbeef5;border-radius:14px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--soft);margin-top:14px}
.kzmap-svg{width:100%;height:auto;display:block}
.kzone{transition:opacity .22s,fill-opacity .15s}
.kzone path{transition:fill-opacity .15s}
.kzone:hover path{fill-opacity:.95 !important}
.kzone.active path{stroke-width:3 !important}
.kzmap-svg.has-sel .kzone:not(.active){opacity:.2}
.kz-prog{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;
font-weight:700;color:var(--muted);font-size:.9rem}
.kzdot{display:inline-block;width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,.12)}
.kzcards{display:grid;grid-template-columns:1fr;gap:16px;margin-top:22px}
.kzflip{cursor:pointer;height:16rem;user-select:none;perspective:1000px}
.kzflip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.kzflip.flipped .kzflip-inner{transform:rotateY(180deg)}
.kzflip-face{position:absolute;inset:0;border-radius:14px;border:3px solid;box-shadow:var(--shadow);
backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;padding:16px;box-sizing:border-box}
.kzflip-front{padding:0;overflow:hidden;align-items:stretch;justify-content:flex-end;background:#dde6f2}
.kzfront-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.kzfront-fallback{position:absolute;inset:0}
.kzfront-overlay{position:relative;width:100%;padding:14px 12px;display:flex;flex-direction:column;align-items:center;
text-align:center;background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,.25) 55%,rgba(0,0,0,0))}
.kzfront-name{font-size:1.25rem;font-weight:800;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.75)}
.kzfront-hint{margin-top:4px;font-size:.78rem;font-style:italic;color:rgba(255,255,255,.92);text-shadow:0 1px 4px rgba(0,0,0,.75)}
.kzflip-back{background:#fff;transform:rotateY(180deg);padding:12px 14px}
.kzback-title{font-size:.9rem;font-weight:800;margin:0 0 4px;padding-bottom:5px;border-bottom:1px solid}
.kzback-clim{font-size:.72rem;font-weight:800;margin:0 0 5px;letter-spacing:.01em}
.kzback-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px;font-size:.76rem;line-height:1.18;flex:1}
.kzback-list li{display:flex;align-items:flex-start;gap:6px}
.kzdotf{width:6px;height:6px;border-radius:50%;flex:0 0 auto;margin-top:5px}
.kzback-list li span:last-child{color:var(--muted)}
@media(min-width:560px){.kzcards{grid-template-columns:1fr 1fr}}
@media(min-width:880px){.kzcards{grid-template-columns:1fr 1fr 1fr}}
/* --- Einstieg: Zuordnungs-Aufgabe --- */
.assign-photos{display:flex;gap:14px;flex-wrap:wrap;margin:14px 0}
.photo-col{flex:1 1 240px;background:#f7faff;border:2px solid var(--soft);border-radius:16px;padding:12px;transition:.15s}
.photo-col.target{border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,157,143,.18);cursor:pointer}
.photo-col figure{margin:0}
.photo-col img{width:100%;border-radius:12px;display:block;aspect-ratio:4/3;object-fit:cover;background:#dde6f2}
.img-fallback{width:100%;aspect-ratio:4/3;border-radius:12px;background:linear-gradient(135deg,#dde6f2,#cdd9ec);
align-items:center;justify-content:center;font-size:2.6rem;font-weight:800;color:#7c8aa3;text-align:center;flex-direction:column;gap:6px}
.img-fallback small{font-size:.8rem;font-weight:700;color:#8c99b0}
.photo-col h3{text-align:center;margin:8px 0 4px}
.photo-col .zone-hint{text-align:center;font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:6px}
.drop-zone{min-height:40px;margin-top:6px;display:flex;flex-direction:column;gap:6px}
.sent-pool{background:#fff7ea;border:2px dashed #f0dca5;border-radius:14px;padding:12px;margin:10px 0;transition:.15s}
.sent-pool .pool-lbl{font-size:.82rem;color:#b9821a;font-weight:800;margin-bottom:8px}
.sent-pool.target{border-color:var(--accent);background:#eafaf6}
.sent-pool .pool-cards{display:flex;flex-direction:column;gap:7px}
.sent-pool .pool-empty{color:var(--muted);font-size:.88rem;font-style:italic}
.sent-card{background:#fff;border:2px solid var(--soft);border-radius:10px;padding:9px 12px;cursor:pointer;
font-size:.9rem;transition:.12s;font-weight:600;line-height:1.4}
.sent-card:hover{border-color:var(--primary)}
.sent-card.sel{border-color:var(--gold);background:#fff7ea;box-shadow:0 0 0 3px rgba(224,167,0,.2)}
.sent-card.ok{border-color:var(--good);background:#e7f7f3}
.sent-card.bad{border-color:var(--bad);background:#fdeee9}
/* --- Lehrer-Zugang: Button + Modal --- */
.teacher-row{text-align:center;margin-top:22px}
.teacher-btn{display:inline-flex;align-items:center;gap:8px;background:#fff;border:2px dashed var(--soft);
color:var(--muted);padding:9px 16px;border-radius:12px;font-weight:700;cursor:pointer;font-size:.9rem;transition:.15s}
.teacher-btn:hover{border-color:var(--primary);color:var(--primary-d)}
.modal-back{position:fixed;inset:0;background:rgba(20,30,50,.55);backdrop-filter:blur(3px);
display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-back.show{display:flex}
.modal-card{background:#fff;border-radius:20px;padding:26px 24px;max-width:420px;width:100%;
box-shadow:0 20px 50px rgba(0,0,0,.3);position:relative;animation:fade .25s ease}
.modal-card h2{margin-top:0;color:var(--primary-d)}
.modal-x{position:absolute;top:10px;right:14px;border:none;background:none;font-size:1.7rem;
cursor:pointer;color:var(--muted);line-height:1}
.code-input{font-size:1.6rem;letter-spacing:.4em;text-align:center;width:100%;padding:12px;
border:2px solid var(--soft);border-radius:12px;margin:10px 0}
.jump-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.jump-grid button{padding:14px 10px;border-radius:12px;border:2px solid var(--soft);background:#f7faff;
font-weight:700;cursor:pointer;transition:.15s;font-size:.92rem;text-align:left}
.jump-grid button:hover{background:#eef4fc;filter:brightness(.97)}
/* --- Bereich 4: Klimafaktoren --- */
.kf-map-outer{position:relative;margin-top:14px}
.kf-points{position:absolute;inset:0;pointer-events:none}
.kf-point{position:absolute;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;
background:#e4572e;border:3px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.45);cursor:pointer;
pointer-events:auto;padding:0;z-index:2}
.kf-point::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:3px solid #e4572e;
animation:kfpulse 1.9s ease-out infinite}
.kf-point.active{background:#2a9d8f;z-index:4}
.kf-point.active::after{border-color:#2a9d8f}
@keyframes kfpulse{0%{transform:scale(1);opacity:.85}100%{transform:scale(2.7);opacity:0}}
.kf-point .kf-tip{position:absolute;bottom:135%;left:50%;transform:translateX(-50%);background:#27324a;
color:#fff;font-size:.72rem;font-weight:700;padding:3px 8px;border-radius:7px;white-space:nowrap;
opacity:0;pointer-events:none;transition:.15s}
.kf-point:hover .kf-tip,.kf-point.active .kf-tip{opacity:1}
.kf-acc{margin-top:18px;display:flex;flex-direction:column;gap:12px}
.kf-box{border:2px solid var(--soft);border-radius:14px;overflow:hidden;background:#fff;transition:.15s}
.kf-box.open{border-color:var(--cool);box-shadow:var(--shadow)}
.kf-box-head{display:flex;align-items:center;gap:11px;padding:14px 16px;cursor:pointer;font-weight:800;
color:var(--primary-d);background:#f7faff;user-select:none}
.kf-box-head .kf-num{width:28px;height:28px;border-radius:50%;background:var(--cool);color:#fff;
display:flex;align-items:center;justify-content:center;font-size:.9rem;flex:0 0 auto}
.kf-box-head .kf-chev{margin-left:auto;transition:transform .2s;color:var(--muted)}
.kf-box.open .kf-box-head .kf-chev{transform:rotate(180deg)}
.kf-box-body{display:none;padding:16px}
.kf-box.open .kf-box-body{display:block}
/* --- Bodø-Box: Aufgaben oben, Lösungen darunter --- */
.bodo-tasks{background:#eef4fc;border:1px solid var(--soft);border-radius:12px;padding:12px 14px;margin-bottom:4px}
.bodo-tasks .qtext{margin:8px 0;font-weight:600}
.bodo-answer{border-top:1px solid var(--soft);padding-top:14px;margin-top:14px}
.bodo-answer .albl{font-weight:800;color:var(--primary-d);font-size:.92rem;margin-bottom:8px}
.bodo-coord{display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.bodo-coord label{font-weight:700}
@media(max-width:560px){body{font-size:16px}.card{padding:18px}h1{font-size:1.4rem}.illu-small{max-width:280px}}
</style>
</head>
<body>
<header>
<div class="logo">Klimazonen-Reise</div>
<div class="score-pill">⭐ <b id="totalPts">0</b> / <span id="totalMax">0</span></div>
</header>
<div class="nav" id="nav"></div>
<main id="main"></main>

<script>
/* ====================== HELFER ====================== */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function norm(s){return (s||"").toLowerCase().replace(/grad/g,"").replace(/[°'"′″\s]/g,"");}
function parseNum(s){const t=(s||"").replace(/[.\s]/g,"");const m=t.match(/-?\d+/);return m?parseInt(m[0],10):NaN;}

/* ====================== STATE ====================== */
const SECT=[
{id:0,name:"Einstieg",color:"#3a7d7b"},
{id:1,name:"Entstehung",color:"#e0843a"},
{id:2,name:"Klimazonen",color:"#2f9e7a"},
{id:3,name:"Klimafaktoren",color:"#3a86ff"},
{id:4,name:"Vegetationszonen",color:"#5a9e2f"},
{id:5,name:"Ergebnis",color:"#8e5fd0",result:true},
];
let state={pts:{},passed:{},awarded:{}};
function load(){try{const s=JSON.parse(localStorage.getItem("klimazonen1"));if(s)state=Object.assign(state,s);}catch(e){}}
function save(){try{localStorage.setItem("klimazonen1",JSON.stringify(state));}catch(e){}}
load();
SECT.forEach(s=>{if(state.pts[s.id]==null)state.pts[s.id]=0;});
function award(id,sect,pts){if(state.awarded[id])return false;state.awarded[id]=true;
state.pts[sect]=(state.pts[sect]||0)+pts;save();updateTotals();return true;}
function totalPts(){return SECT.reduce((a,s)=>a+(state.pts[s.id]||0),0);}
function totalMax(){return SECT.reduce((a,s)=>a+(s.max||0),0);}
function updateTotals(){document.getElementById("totalPts").textContent=totalPts();document.getElementById("totalMax").textContent=totalMax();}

/* ====================== AUFGABEN-ENGINE ====================== */
function renderTasks(host,sectId,tasks,onDone){
host.innerHTML="";
const head=document.createElement("div");head.className="boxhead";head.innerHTML='Aufgaben<span class="pts" id="tp_'+sectId+'"></span>';
const prog=document.createElement("div");prog.className="progress";
const body=document.createElement("div");
host.append(head,prog,body);
let i=0;
function show(){
while(i<tasks.length&&state.awarded["task-"+sectId+"-"+i])i++;
if(i>=tasks.length){finish();return;}
const t=tasks[i];let attempt=0;
head.querySelector(".pts").textContent=t.points+" P";
head.querySelector(".pts").style.display="";
prog.textContent="Aufgabe "+(i+1)+" von "+tasks.length;
body.innerHTML='<div class="qtext">'+t.q+'</div>'+(t.html||"");
const fb=document.createElement("div");fb.className="feedback";
const btn=document.createElement("button");btn.className="btn accent";btn.textContent="Prüfen";
body.append(btn,fb);
if(t.onStart)t.onStart(body);
btn.onclick=()=>{
const res=t.check(body);
if(res==="incomplete"){fb.className="feedback hint";fb.textContent="💡 Bitte wähle bzw. ordne zuerst alles zu.";return;}
if(res){
const pts=attempt===0?t.points:Math.ceil(t.points/2);
const got=award("task-"+sectId+"-"+i,sectId,pts);
fb.className="feedback ok";fb.textContent=(t.success||"Richtig!")+(got?(" +"+pts+" Punkte"):"");
btn.textContent="Weiter →";btn.className="btn";btn.onclick=()=>{i++;show();};
}else{attempt++;
if(attempt===1){fb.className="feedback hint";fb.textContent="💡 "+t.hint;}
else{fb.className="feedback no";fb.textContent="Noch nicht ganz – schau dir den Hinweis noch mal an: 💡 "+t.hint;}}
};
}
function finish(){head.querySelector(".pts").style.display="none";prog.textContent="Alle Aufgaben gelöst ✓";
body.innerHTML='<div class="feedback ok">Stark! Du hast alle Aufgaben dieses Bereichs geschafft.</div>';onDone&&onDone();}
show();
}

/* Bausteine für Aufgaben */
function mcTask(q,options,correct,hint,points,success){
return {q:q,points:points,success:success,hint:hint,
html:'<div class="taskopts"></div>',

/* ====================== QUIZ-ENGINE ====================== */
function renderQuiz(host,sectId,pool,count,onPass){
host.innerHTML="";
const head=document.createElement("div");head.className="boxhead";head.textContent="Quiz";
const prog=document.createElement("div");prog.className="progress";
const body=document.createElement("div");host.append(head,prog,body);
if(state.passed[sectId]){prog.textContent="Quiz abgeschlossen ✓";
body.innerHTML='<div class="feedback ok">🎉 Du hast dieses Quiz bereits geschafft.</div>';onPass&&onPass();return;}
let bag=shuffle(pool.slice()),lastQ=null,slot=0;
function draw(){if(bag.length===0)bag=shuffle(pool.slice());let q=bag.shift();
if(q===lastQ&&bag.length){bag.push(q);q=bag.shift();}lastQ=q;return q;}
function next(){
if(slot>=count){prog.textContent="Quiz abgeschlossen ✓";
body.innerHTML='<div class="feedback ok">🎉 Geschafft! Du kannst zum nächsten Abschnitt.</div>';onPass&&onPass();return;}
render(draw(),0);
}
function render(q,attempt){
prog.textContent="Frage "+(slot+1)+" von "+count;
body.innerHTML='<div class="qtext">'+q.q+'</div>';
let sel=null,inp=null;
if(q.type==="input"){inp=document.createElement("input");inp.type="text";inp.placeholder="Antwort…";body.appendChild(inp);}
else{q.options.forEach((op,oi)=>{const o=document.createElement("label");o.className="opt";o.textContent=op;
o.onclick=()=>{[...body.querySelectorAll(".opt")].forEach(c=>c.classList.remove("sel"));o.classList.add("sel");sel=oi;};body.appendChild(o);});}
const fb=document.createElement("div");fb.className="feedback";
const btn=document.createElement("button");btn.className="btn accent";btn.textContent="Antworten";
body.append(btn,fb);
btn.onclick=()=>{
let ok;
if(q.type==="input")ok=q.answer.some(a=>norm(a)===norm(inp.value));
else ok=sel===q.answer;
if(ok){const pts=attempt===0?10:5;const got=award("q-"+sectId+"-"+slot,sectId,pts);
fb.className="feedback ok";fb.textContent="Richtig!"+(got?(" +"+pts+" Punkte"):"");
if(q.type!=="input"&&sel!=null)body.querySelectorAll(".opt")[sel].classList.add("correct");
btn.textContent="Weiter →";btn.className="btn";btn.onclick=()=>{slot++;next();};
}else{
if(q.type!=="input"&&sel!=null)body.querySelectorAll(".opt")[sel].classList.add("wrong");
attempt++;
if(attempt===1){fb.className="feedback hint";fb.textContent="💡 "+q.hint+" – versuch es nochmal.";}
else{fb.className="feedback no";fb.textContent="Leider wieder falsch. Schau dir den Hinweis noch mal an. Du bekommst eine neue Frage…";
setTimeout(()=>render(draw(),0),1300);}
}
};
}
next();
}

let current=0,teacherMode=false;const nextBtns={},flags={};
function maxUnlocked(){if(teacherMode)return SECT.length-1;let m=0;
for(let i=1;i<SECT.length;i++){if(state.passed[i-1]||SECT[i-1].result)m=i;else break;}return m;}
function buildNav(){const nav=document.getElementById("nav");nav.innerHTML="";
SECT.forEach(s=>{const b=document.createElement("button");b.textContent=s.name;
const open=s.id===0||s.id<=maxUnlocked();const active=s.id===current;
b.style.color=active?"#fff":s.color;b.style.background=active?s.color:s.color+"1e";b.style.borderColor=s.color;
if(state.passed[s.id])b.classList.add("done");
if(!open)b.classList.add("locked");
b.onclick=()=>{if(open)show(s.id);};nav.appendChild(b);});}
function markPassed(id){state.passed[id]=true;save();buildNav();if(nextBtns[id])nextBtns[id].disabled=false;}
function sectFlag(id,which){flags[id]=flags[id]||{};flags[id][which]=true;
const need=id===0?["quiz"]:["tasks","quiz"];
if(need.every(k=>flags[id][k]))markPassed(id);}
function show(id){current=id;buildNav();const main=document.getElementById("main");
[...main.children].forEach(c=>c.classList.remove("show"));
let el=document.getElementById("step"+id);
if(!el){el=builders[id]();el.id="step"+id;el.className="step";main.appendChild(el);}
el.classList.add("show");window.scrollTo(0,0);}
function footer(id){const f=document.createElement("div");f.className="foot";
const back=document.createElement("button");back.className="btn ghost";back.textContent="← Zurück";
back.onclick=()=>show(Math.max(0,id-1));back.style.visibility=id===0?"hidden":"visible";
const next=document.createElement("button");next.className="btn";next.textContent="Weiter →";
next.onclick=()=>show(id+1);next.disabled=!state.passed[id];nextBtns[id]=next;
f.append(back,next);return f;}

const selType=selected?byId(selected).type:null;
sitWrap.querySelectorAll(".sit").forEach(c=>c.classList.toggle("target",!!selType));
poolLines.parentElement.classList.toggle("target",selType==="line");
poolTiles.parentElement.classList.toggle("target",selType==="tile");
}
function placeInSit(sitId){
if(locked||!selected)return;
const it=byId(selected);
const existing=MATCH_ITEMS.find(i=>i.type===it.type&&loc[i.id]===sitId&&i.id!==selected);
if(existing)loc[existing.id]="pool";
loc[selected]=sitId;selected=null;render();
}
SIT_DEF.forEach(s=>{sitWrap.querySelector('.sit[data-sit="'+s.id+'"]').onclick=()=>placeInSit(s.id);});
poolLines.parentElement.onclick=()=>{if(selected&&!locked){loc[selected]="pool";selected=null;render();}};
poolTiles.parentElement.onclick=()=>{if(selected&&!locked){loc[selected]="pool";selected=null;render();}};
checkBtn.onclick=()=>{
if(locked)return;
if(MATCH_ITEMS.some(i=>loc[i.id]==="pool")){fb.className="feedback hint";
fb.textContent="💡 Ordne zuerst alle Linien und Erklärungen den drei Situationen zu.";return;}
let allOk=true;
MATCH_ITEMS.forEach(i=>{if(loc[i.id]!==i.correct)allOk=false;});
sitWrap.querySelectorAll(".mitem").forEach(el=>{const it=byId(el.dataset.id);
const ok=loc[it.id]===it.correct;el.classList.toggle("ok",ok);el.classList.toggle("bad",!ok);});
if(allOk){
const pts=attempt===0?30:15;
const got=award("ent-match",1,pts);
fb.className="feedback ok";fb.textContent="Alles richtig zugeordnet! 🎉"+(got?(" +"+pts+" Punkte"):"");
locked=true;checkBtn.disabled=true;resetBtn.disabled=true;render();updateTasksFlag();
}else{
attempt++;
if(attempt===1){fb.className="feedback hint";
fb.textContent="💡 Denk an die Nummern im Schema: 1 = Nordpol (flacher Winkel), 3 = Äquator (steiler Winkel). Steiler → kleine Fläche → starke Erwärmung.";}
else{fb.className="feedback no";
fb.textContent="Noch nicht ganz – schau dir den Hinweis noch mal an: 💡 Je steiler die Strahlen, desto kleiner die Fläche und desto stärker die Erwärmung.";}
}
};
resetBtn.onclick=()=>{if(locked)return;selected=null;MATCH_ITEMS.forEach(i=>loc[i.id]="pool");fb.textContent="";render();};
if(locked){fb.className="feedback ok";fb.textContent="Bereits gelöst ✓";checkBtn.disabled=true;resetBtn.disabled=true;}
render();
})();

renderTasks(host,1,ENT_TASKS,()=>{updateTasksFlag();});
updateTasksFlag();

renderQuiz(quizHost,1,ENT_QUIZ,6,()=>{sectFlag(1,"quiz");
note.textContent="Quiz geschafft – der nächste Bereich ist freigeschaltet. 🎉";});

if(state.passed[1])note.textContent="Bereich abgeschlossen ✓";
},30);
return w;
};

     function renderTemp(){
       factor.innerHTML="";
       prog.textContent="Aufgabe 1 von 4";
       const OPTS=[
         "Die Temperatur bleibt vom Fuß bis zum Gipfel ungefähr gleich.",
         "Die Temperatur steigt vom Fuß bis zum Gipfel um 20 °C.",
         "Die Temperatur sinkt vom Fuß bis zum Gipfel um 20 °C.",
         "Die Temperatur sinkt vom Fuß bis zum Gipfel um 5 °C.",
       ];
       const OK=2;
       stepHost.innerHTML='<div class="qtext"><b>Aufgabe:</b> Beobachte die Veränderung der Temperatur vom Fuß des Berges bis zum Gipfel. Was stellst du fest?</div>'+
         '<div id="alpTempOpts"></div><button class="btn accent" id="alpTempBtn">Antworten</button><div class="feedback" id="alpTempFb"></div>';
       const host=stepHost.querySelector("#alpTempOpts"),btn=stepHost.querySelector("#alpTempBtn"),fb=stepHost.querySelector("#alpTempFb");
       let sel=null,attempt=0;
       OPTS.forEach((o,i)=>{const e=document.createElement("label");e.className="opt";e.textContent=o;
         e.onclick=()=>{[...host.children].forEach(c=>c.classList.remove("sel","wrong"));e.classList.add("sel");sel=i;};host.appendChild(e);});
       btn.onclick=()=>{
         if(sel==null){fb.className="feedback hint";fb.textContent="💡 Bitte wähle zuerst eine Antwort.";return;}
         if(sel===OK){host.children[OK].classList.add("correct");
           const pts=attempt===0?10:5;const got=award("alp-temp",3,pts);
           fb.className="feedback ok";fb.textContent="Richtig – von 10 °C auf −10 °C, also 20 °C kälter!"+(got?(" +"+pts+" Punkte"):"");
           [...host.children].forEach(c=>c.onclick=null);
           factor.innerHTML='<div class="box def"><h4>💡 Der thermische Gradient</h4>'+
             'Die Temperatur sinkt um <b>0,5 °C pro 100 m</b> (oder 5 °C pro 1.000 m) in feuchter Luft. '+
             'Dies nennt man den <b>thermischen Gradienten</b>. Deshalb ist es oben in den Bergen immer kälter '+
             'als unten am Strand. Ganz oben auf den Bergspitzen herrscht daher auch ein anderes Klima.</div>';
           btn.textContent="Weiter →";btn.className="btn";btn.onclick=()=>renderAssign();
         }else{host.children[sel].classList.add("wrong");attempt++;
           if(attempt===1){fb.className="feedback hint";fb.textContent="💡 Vergleiche die Temperatur ganz unten (0 m) mit der ganz oben (4.000 m).";}
           else{fb.className="feedback no";fb.textContent="Noch nicht ganz: 💡 Von 10 °C (Fuß) bis −10 °C (Gipfel) sind es 20 °C Unterschied.";}}
       };
     }

     /* --- Aufgabe 2 von 4: Foto-Zuordnung (Kacheln) --- */
    function renderAssign(){
       factor.innerHTML="";
       prog.textContent="Aufgabe 2 von 4";
       stepHost.innerHTML=`
         <div class="qtext"><b>Aufgabe:</b> Ordne die Fotos den richtigen Höhenstufen zu. Tippe ein Foto an (es wird golden markiert) und tippe danach auf die passende Höhenstufe (nach Höhe geordnet).</div>
         <div id="alpTargets" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:14px 0;padding:12px;border:2px solid transparent"></div>
         <div class="sent-pool" id="alpPool"><div class="pool-lbl">📋 Fotos – tippe eins an und ordne es zu</div><div id="alpPoolCards" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px"></div></div>
         <div style="text-align:center;margin-top:6px"><button class="btn accent" id="alpAssignCheck">Zuordnung prüfen</button><button class="btn ghost" id="alpAssignReset">Zurücksetzen</button></div>
         <div class="feedback" id="alpAssignFb" style="text-align:center"></div>`;
       const targets=stepHost.querySelector("#alpTargets"),poolCards=stepHost.querySelector("#alpPoolCards"),
             pool=stepHost.querySelector("#alpPool"),fb=stepHost.querySelector("#alpAssignFb"),
             checkBtn=stepHost.querySelector("#alpAssignCheck"),resetBtn=stepHost.querySelector("#alpAssignReset");
       let loc={},selected=null,locked=false;
       const order=shuffle(ST.map(s=>s.id));
       ST.forEach(s=>loc[s.id]="pool");
       function byId(id){return ST.find(s=>s.id===id);}
       targets.innerHTML="";
       ST.forEach(s=>{const col=document.createElement("div");col.dataset.target=s.id;
         col.style.cssText="display:flex;flex-direction:column;gap:6px;cursor:pointer";
         col.innerHTML='<div class="zone-hint" style="font-size:1rem;color:var(--primary-d);margin:0"><b>'+s.range+'</b></div><div class="drop-zone" data-zone="'+s.id+'" style="margin-top:0"></div>';
         col.onclick=()=>placeIn(s.id);targets.appendChild(col);});
       function makeCard(s){const c=document.createElement("div");c.className="sent-card";c.dataset.id=s.id;
         c.style.cssText="position:relative;padding:0;overflow:hidden;width:100%;aspect-ratio:4 / 3";
         c.innerHTML='<img src="'+s.img+'" alt="'+s.name+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#dde6f2" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'+
           '<div style="display:none;position:absolute;inset:0;width:100%;height:100%;background:#dde6f2;align-items:center;justify-content:center;font-size:2.4rem">'+s.emoji+'</div>'+
           '<div style="position:absolute;left:0;right:0;bottom:0;padding:7px 8px;background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,0));color:#fff;font-weight:800;font-size:.85rem;line-height:1.2;text-shadow:0 1px 4px rgba(0,0,0,.85)">'+s.name+'</div>';
         if(selected===s.id)c.classList.add("sel");if(locked)c.classList.add("ok");
         c.onclick=ev=>{ev.stopPropagation();if(locked)return;selected=(selected===s.id)?null:s.id;render();};return c;}
       function placeholderBox(){return '<div class="ph" style="width:100%;aspect-ratio:4 / 3;border:2px dashed #c3cee0;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#9fb0c8;font-size:.8rem;font-weight:700;text-align:center;box-sizing:border-box">Foto hierher</div>';}
       function render(){poolCards.innerHTML="";targets.querySelectorAll(".drop-zone").forEach(z=>z.innerHTML="");
         const poolIds=order.filter(id=>loc[id]==="pool");
         poolIds.forEach(id=>poolCards.appendChild(makeCard(byId(id))));
         if(!poolIds.length&&!locked){const e=document.createElement("div");e.className="pool-empty";e.style.gridColumn="1 / -1";e.textContent="Alle Fotos zugeordnet – jetzt prüfen!";poolCards.appendChild(e);}
         ST.forEach(s=>{const placed=order.find(id=>loc[id]===s.id);
           const z=targets.querySelector('.drop-zone[data-zone="'+s.id+'"]');
           if(placed)z.appendChild(makeCard(byId(placed)));
           else z.innerHTML=placeholderBox();});
         targets.querySelectorAll(".ph").forEach(ph=>ph.style.borderColor=selected!=null?"var(--accent)":"#c3cee0");
         pool.classList.toggle("target",selected!=null);}
       function placeIn(tid){if(locked||selected==null)return;
         const ex=order.find(id=>loc[id]===tid&&id!==selected);if(ex)loc[ex]="pool";
         loc[selected]=tid;selected=null;render();}
       function goNext(){const nx=document.createElement("button");nx.className="btn";nx.textContent="Weiter →";nx.style.marginTop="8px";
         nx.onclick=()=>renderLogic();fb.after(nx);}
       pool.onclick=()=>{if(selected&&!locked){loc[selected]="pool";selected=null;render();}};
       checkBtn.onclick=()=>{if(locked)return;
         if(order.some(id=>loc[id]==="pool")){fb.className="feedback hint";fb.textContent="💡 Ordne zuerst alle vier Fotos zu.";return;}
         const allOk=order.every(id=>loc[id]===id);
         targets.querySelectorAll(".sent-card").forEach(c=>{const ok=loc[c.dataset.id]===c.dataset.id;c.classList.toggle("ok",ok);c.classList.toggle("bad",!ok);});
         if(allOk){const got=award("alp-assign",3,20);fb.className="feedback ok";fb.textContent="Alles richtig zugeordnet! 🎉"+(got?" +20 Punkte":"");
           locked=true;checkBtn.style.display="none";resetBtn.style.display="none";render();goNext();}
         else{fb.className="feedback no";fb.textContent="Einige Fotos passen noch nicht (rot). Tippe sie an und ordne sie neu zu.";}};
       resetBtn.onclick=()=>{if(locked)return;selected=null;ST.forEach(s=>loc[s.id]="pool");fb.textContent="";render();};
       render();
     }

     /* --- Aufgabe 3 von 4: Logik der Höhenstufen --- */
     function renderLogic(){
       factor.innerHTML="";
       prog.textContent="Aufgabe 3 von 4";
       const OPTS=[
         {t:"Mit steigender Höhe wird die Vegetation immer spärlicher, da die Temperaturen mit der Höhe sinken.",ok:true},
         {t:"Mit steigender Höhe wird die Vegetation immer üppiger, weil es oben am meisten regnet.",ok:false},
         {t:"Die Verteilung der Höhenstufen ist zufällig und folgt keiner Regel.",ok:false},
         {t:"Die Höhenstufen verteilen sich nach der Bodenfarbe, nicht nach der Höhe.",ok:false},
       ];
       const SH=shuffle(OPTS.slice()),OK=SH.findIndex(o=>o.ok);
       stepHost.innerHTML='<div class="qtext"><b>Aufgabe:</b> Überlege dir, nach welcher Logik sich die Höhenstufen am Berg verteilen? Wähle die richtige Antwort.</div>'+
         '<div id="alpLogicOpts"></div><button class="btn accent" id="alpLogicBtn">Antworten</button><div class="feedback" id="alpLogicFb"></div>';
       const host=stepHost.querySelector("#alpLogicOpts"),btn=stepHost.querySelector("#alpLogicBtn"),fb=stepHost.querySelector("#alpLogicFb");
       let sel=null,attempt=0;
       SH.forEach((o,i)=>{const e=document.createElement("label");e.className="opt";e.textContent=o.t;
         e.onclick=()=>{[...host.children].forEach(c=>c.classList.remove("sel","wrong"));e.classList.add("sel");sel=i;};host.appendChild(e);});
       btn.onclick=()=>{
         if(sel==null){fb.className="feedback hint";fb.textContent="💡 Bitte wähle zuerst eine Antwort.";return;}
         if(sel===OK){host.children[OK].classList.add("correct");
           const pts=attempt===0?10:5;const got=award("alp-logic",3,pts);
           fb.className="feedback ok";fb.textContent="Genau richtig!"+(got?(" +"+pts+" Punkte"):"");
           [...host.children].forEach(c=>c.onclick=null);
           btn.textContent="Weiter →";btn.className="btn";btn.onclick=()=>renderClimate();
         }else{host.children[sel].classList.add("wrong");attempt++;
           if(attempt===1){fb.className="feedback hint";fb.textContent="💡 Denk an den thermischen Gradienten: oben ist es kälter.";}
           else{fb.className="feedback no";fb.textContent="Noch nicht ganz: 💡 Weniger Wärme oben → weniger Pflanzen.";}}
       };
     }

     /* --- Aufgabe 4 von 4: Klima Fuß/Gipfel (touch-optimiert) --- */
   function renderClimate(){
       factor.innerHTML="";
       prog.textContent="Aufgabe 4 von 4";
       const ZONES=["Tropische Zone","Subtropische Zone","Gemäßigte Zone","Subpolare Zone","Polare Zone"];
       const FOOT_OK=2,PEAK_OK=[3,4]; /* Gipfel: subpolar ODER polar gilt */
       stepHost.innerHTML=`
         <div class="qtext"><b>Aufgabe:</b> Finde anhand der Jahresmitteltemperaturen heraus, welches Klima am <b>Fuß</b> des Berges (10 °C) und welches auf dem <b>Gipfel</b> (−10 °C) vorherrscht. Gehe bei Bedarf zurück zu Bereich 3 (Die Klimazonen).</div>
         <div style="font-weight:800;color:var(--primary-d);margin-top:10px">🏔️ Am Fuß des Berges (10 °C):</div>
         <div id="alpFootOpts"></div>
         <div style="font-weight:800;color:var(--primary-d);margin-top:10px">⛰️ Auf dem Gipfel (−10 °C):</div>
         <div id="alpPeakOpts"></div>
         <button class="btn accent" id="alpClimBtn" style="margin-top:12px">Antworten</button>
         <div class="feedback" id="alpClimFb"></div>
         <div id="alpClimReveal"></div>`;
       const footHost=stepHost.querySelector("#alpFootOpts"),peakHost=stepHost.querySelector("#alpPeakOpts"),
             btn=stepHost.querySelector("#alpClimBtn"),fb=stepHost.querySelector("#alpClimFb"),
             reveal=stepHost.querySelector("#alpClimReveal");
       let footSel=null,peakSel=null,attempt=0;
       function buildGroup(host,onPick){host.style.display="flex";host.style.flexWrap="wrap";host.style.gap="8px";host.style.margin="6px 0";
         ZONES.forEach((z,i)=>{const e=document.createElement("button");e.type="button";e.className="opt";
           e.style.margin="0";e.style.width="auto";e.style.flex="0 0 auto";e.textContent=z;
           e.onclick=()=>{[...host.children].forEach(c=>c.classList.remove("sel","wrong"));e.classList.add("sel");onPick(i);};
           host.appendChild(e);});}
       buildGroup(footHost,i=>footSel=i);
       buildGroup(peakHost,i=>peakSel=i);
       btn.onclick=()=>{
         if(footSel==null||peakSel==null){fb.className="feedback hint";fb.textContent="💡 Bitte wähle für Fuß und Gipfel je eine Klimazone.";return;}
         const footOk=footSel===FOOT_OK,peakOk=PEAK_OK.includes(peakSel);
         if(footOk&&peakOk){
           footHost.children[FOOT_OK].classList.add("correct");peakHost.children[peakSel].classList.add("correct");
           const pts=attempt===0?20:10;const got=award("alp-climate",3,pts);
           fb.className="feedback ok";fb.textContent="Richtig – Fuß: gemäßigte Zone (10 °C), Gipfel: subpolare bzw. polare Zone (−10 °C)."+(got?(" +"+pts+" Punkte"):"");
           reveal.innerHTML='<div class="box tip" style="margin-top:12px"><h4>📌 Merkhilfe</h4>'+
             'Das Klima verändert sich also nicht nur mit der <b>Breitenlage</b>, sondern auch mit der <b>Höhenlage</b>.</div>';
           [...footHost.children,...peakHost.children].forEach(c=>c.onclick=null);
           btn.textContent="Weiter →";btn.className="btn";btn.onclick=()=>finish();
         }else{
           if(!footOk&&footSel!=null)footHost.children[footSel].classList.add("wrong");
           if(!peakOk&&peakSel!=null)peakHost.children[peakSel].classList.add("wrong");
           attempt++;
           if(attempt===1){fb.className="feedback hint";fb.textContent="💡 10 °C ist eine milde Durchschnittstemperatur, −10 °C eine sehr kalte. Vergleiche mit Bereich 3.";}
           else{fb.className="feedback no";fb.textContent="Noch nicht ganz: 💡 10 °C passt zur gemäßigten Zone, −10 °C zur subpolaren bzw. polaren Zone.";}
         }
       };
     }




     /* --- Start: zur ersten noch nicht gelösten Aufgabe springen --- */
     if(!state.awarded["alp-temp"])renderTemp();
     else if(!state.awarded["alp-assign"])renderAssign();
     else if(!state.awarded["alp-logic"])renderLogic();
     else if(!state.awarded["alp-climate"])renderClimate();
     else finish();
   })();
w.querySelector("#kfBody-kisangani").innerHTML='<div class="profi-ph">🚧 Inhalt folgt – Kisangani bauen wir später aus.</div>';

/* ---- Öffnen-Logik: immer nur eine Box ---- */
let openId=null;
function setActivePoint(pid){pointsHost.querySelectorAll(".kf-point").forEach(pt=>pt.classList.toggle("active",pt.dataset.id===pid));}
function openBox(boxId,pointId){
const isOpen=boxEls[boxId].classList.contains("open");
if(pointId==null&&isOpen){boxEls[boxId].classList.remove("open");openId=null;setActivePoint(null);return;}
KF_BOXES.forEach(bx=>boxEls[bx.id].classList.toggle("open",bx.id===boxId));
openId=boxId;setActivePoint(pointId);
if(pointId!=null)boxEls[boxId].scrollIntoView({behavior:"smooth",block:"center"});
}

/* ---- vorläufig + Lehrer ---- */
w.querySelector("#teacherOpen3").onclick=()=>openTeacher();
const done=w.querySelector("#kfDoneTmp");
if(state.passed[3]){done.textContent="✓ Abgeschlossen";done.disabled=true;}
done.onclick=()=>{markPassed(3);done.textContent="✓ Abgeschlossen";done.disabled=true;};
},30);
return w;
};

/* --- 4 Vegetationszonen --- */
builders[4]=placeholder(4,"Bereich 5","Vegetationszonen",
`<p>Wo welches Klima herrscht, wächst auch eine bestimmte Pflanzenwelt. Du verbindest die
Klimazonen mit ihren typischen <b>Vegetationszonen</b> – von der Tundra bis zum Regenwald.</p>`,
false);

/* --- 5 Ergebnis --- */
builders[5]=()=>{const w=document.createElement("div");w.innerHTML=`<div class="card" id="rc"></div>`;
setTimeout(()=>renderResult(w.querySelector("#rc")),20);return w;};
function renderResult(host){const tp=totalPts(),tm=totalMax(),pc=tm?Math.round(tp/tm*100):0;
let emoji="🌱",title="Klima-Entdecker";
if(pc>=90){emoji="🌍";title="Klima-Profi";}else if(pc>=70){emoji="🧭";title="Klima-Forscher";}
else if(pc>=50){emoji="🗺️";title="Klima-Kundschafter";}
let rows="";SECT.filter(s=>!s.result).forEach(s=>{
const passed=!!state.passed[s.id];
const p=state.pts[s.id]||0,mx=s.max||0,perc=mx?Math.round(p/mx*100):0;
const statusTxt=mx>0?(p+" / "+mx):(passed?"erledigt ✓":"offen");
const advice=passed?"Bereich abgeschlossen.":"Noch nicht abgeschlossen.";
rows+=`<tr><td>${s.name}</td><td>${statusTxt}</td><td><div class="bar"><i style="width:${passed?Math.max(perc,8):0}%"></i></div></td><td class="hint">${advice}</td></tr>`;});
host.innerHTML=`<div class="kicker">Bereich 6 · Ergebnis</div><h1>Deine Auswertung</h1>
<div class="badge-box"><div class="emoji">${emoji}</div><div class="title">${title}</div>
<p>Du hast <b>${tp}</b> von <b>${tm}</b> Punkten erreicht (${pc}%).</p>
<p class="hint">Hinweis: Weitere Punkte werden vergeben, sobald wir die übrigen Bereiche mit Aufgaben füllen.</p></div>
<h2>Übersicht der Bereiche</h2>
<table class="scores"><tr><th>Bereich</th><th>Punkte / Status</th><th>Fortschritt</th><th>Hinweis</th></tr>${rows}</table>
<div class="foot"><button class="btn ghost" onclick="show(0)">↩ Zur Reise</button>
<button class="btn" onclick="resetAll()">Fortschritt zurücksetzen</button></div>`;}
function resetAll(){try{localStorage.removeItem("klimazonen1");}catch(e){}location.reload();}

/* ====================== MAX-PUNKTE & START ====================== */
SECT[0].max=50;
SECT[1].max=110;
SECT[2].max=100;
SECT[3].max=90;
SECT[4].max=0;
SECT[5].max=0;
updateTotals();setupTeacherModal();buildNav();show(0);
window.show=show;window.resetAll=resetAll;
</script>
</body>
