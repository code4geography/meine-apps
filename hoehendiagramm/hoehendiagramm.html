    function buildSmoothPath(points) {
      if (points.length < 2) return "";
      const p = points;
      let d = `M ${p[0].x.toFixed(2)} ${p[0].y.toFixed(2)}`;
      for (let i = 0; i < p.length - 1; i++) {
        const p0 = p[Math.max(i - 1, 0)];
        const p1 = p[i];
        const p2 = p[i + 1];
        const p3 = p[Math.min(i + 2, p.length - 1)];
        const c1x = p1.x + (p2.x - p0.x) / 6;
        const c1y = p1.y + (p2.y - p0.y) / 6;
        const c2x = p2.x - (p3.x - p1.x) / 6;
        const c2y = p2.y - (p3.y - p1.y) / 6;
        d += ` C ${c1x.toFixed(2)} ${c1y.toFixed(2)}, ${c2x.toFixed(2)} ${c2y.toFixed(2)}, ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
      }
      return d;
    }

      const MAX_STEP = 7;
      const stepNames = ["Karte", "Schnittlinie", "Achsen", "Achsenbeschriftung", "Wanderpunkt", "Profillinie", "Höhenschichten", "Vegetation"];

      const [profileDots, setProfileDots] = useState([]);
      const [dash, setDash] = useState(null);
      const [walkerDone, setWalkerDone] = useState(false);
      const [paused, setPaused] = useState(false);
      const pausedRef = useRef(false);

      const [linkedPoint, setLinkedPoint] = useState(null);

      const [vegetation, setVegetation] = useState(null);
      const vegSetRef = useRef(false);

      const [showExplanations, setShowExplanations] = useState(true);

      const [skippedSteps, setSkippedSteps] = useState(() => new Set());
      const sk = (s) => skippedSteps.has(s);

      const [drawMode, setDrawMode] = useState(false);
      const [drawColor, setDrawColor] = useState(stiftFarben[0].wert);
      const drawColorRef = useRef(stiftFarben[0].wert);
      const canvasRef = useRef(null);
      const contentRef = useRef(null);
      const isDrawingRef = useRef(false);
      const lastPtRef = useRef({ x: 0, y: 0 });

      useEffect(() => { drawColorRef.current = drawColor; }, [drawColor]);

      useEffect(() => {
        const wrapper = contentRef.current;
        const canvas = canvasRef.current;
        if (!wrapper || !canvas) return;

        const ctx = canvas.getContext('2d');
        let pendingRaf = null;

        const resize = () => {
          pendingRaf = null;
          const w = Math.max(1, Math.round(wrapper.clientWidth));
          const h = Math.max(1, Math.round(wrapper.clientHeight));
          if (canvas.width === w && canvas.height === h) return;

          let saved = null;
          if (canvas.width > 0 && canvas.height > 0) {
            saved = document.createElement('canvas');
            saved.width = canvas.width;
            saved.height = canvas.height;
            saved.getContext('2d').drawImage(canvas, 0, 0);
          }
          canvas.width = w;
          canvas.height = h;
          if (saved) ctx.drawImage(saved, 0, 0);
        };

        const scheduleResize = () => {
          if (pendingRaf !== null) return;
          pendingRaf = requestAnimationFrame(resize);
        };

        scheduleResize();
        const ro = new ResizeObserver(scheduleResize);
        ro.observe(wrapper);
        return () => {
          ro.disconnect();
          if (pendingRaf !== null) cancelAnimationFrame(pendingRaf);
        };
      }, []);

      const getCanvasPos = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const handleDrawStart = (e) => {
        if (!drawMode) return;
        e.preventDefault();
        try { canvasRef.current.setPointerCapture(e.pointerId); } catch (err) {}
        isDrawingRef.current = true;
        const pos = getCanvasPos(e);
        lastPtRef.current = pos;
        const ctx = canvasRef.current.getContext('2d');
        ctx.fillStyle = drawColorRef.current;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
      };

      const handleDrawMove = (e) => {
        if (!drawMode || !isDrawingRef.current) return;
        e.preventDefault();
        const pos = getCanvasPos(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.strokeStyle = drawColorRef.current;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(lastPtRef.current.x, lastPtRef.current.y);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        lastPtRef.current = pos;
      };

      const handleDrawEnd = (e) => {
        if (isDrawingRef.current) {
          isDrawingRef.current = false;
          try { canvasRef.current.releasePointerCapture(e.pointerId); } catch (err) {}
        }
      };

      const clearDrawing = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      };

      const togglePause = () => {
        pausedRef.current = !pausedRef.current;
        setPaused(pausedRef.current);
      };

      const toggleLinkedPoint = (d) => {
        setLinkedPoint(lp => (lp && Math.abs(lp.x - d.x) < 0.5) ? null : { x: d.x, elevation: d.elevation });
      };

      const reset = () => {
        setStep(0);
        setSelectedLine(null);
        setHoveredElevation(null);
        setWalker({ visible: false, x: 0, pulsing: false });
        setProfileDots([]);
        setDash(null);
        setWalkerDone(false);
        setVegetation(null);
        vegSetRef.current = false;
        setLinkedPoint(null);
        setSkippedSteps(new Set());
        pausedRef.current = false;
        setPaused(false);
      };

      const goNext = () => {
        setStep(prev => Math.min(prev + 1, MAX_STEP));
      };

      const goBack = () => {
        if (step === 0) return;
        const target = step - 1;

        if (target <= 4) {
          setProfileDots([]);
          setDash(null);
          setWalker({ visible: false, x: 0, pulsing: false });
          setWalkerDone(false);
          setLinkedPoint(null);
          pausedRef.current = false;
          setPaused(false);
        }

        if (target < 7) {
          setVegetation(null);
          vegSetRef.current = false;
        }

        setSkippedSteps(prev => {
          const n = new Set();
          prev.forEach(s => { if (s < target) n.add(s); });
          return n;
        });

        setStep(target);
      };

      const skipStep = () => {
        if (step === 4) {
          if (!intersections || walkerDone) return;
          const all = intersections.slice();
          setProfileDots(all.map(p => ({ x: p.x, elevation: p.elevation })));

          const minors = all.filter(p => !p.isMajor).sort((a, b) => b.x - a.x);

          setPaused(false);

        { id: "hoehe_140", elevation: 140, isMajor: false, d: "M74.91.75s-4.97,9.6-5.52,13.97.28,6.3,2.76,8.51,6.9,9.93,2.76,12.14-11.31.83-14.62,6.62-4.69,9.38-5.24,15.45-.83,12.14-8.55,20.97c-7.72,8.83-10.48,13.79-2.21,20.14,0,0,5.79,3.03,11.59,3.59s8,5.24,8,7.72-9.38,14.62-9.38,14.62c0,0-4.97,8.55-4.14,12.41s4.41,8.28,5.24,12.97,1.93,13.24,4.97,19.03-1.47,14.62-1.47,14.62c0,0-1.19,3.03,0,6.07s1.84,8.28,0,12.14.31,9.6,3.51,12.53,4.85,6.51,8.44,7.89.28,3.72.28,3.72" },

        let x = xMin + 4;
        while (x < xMax - 4) {
          const y = yAtX(x);
          const e = elevAtY(y);
          const nearTower = Math.abs(x - peak.x) < TOWER_HALF;
          const nearHouse = Math.abs(x - plateau.x) < HOUSE_HALF;
          let stepX;

          if (nearTower || nearHouse) {
            stepX = 5;
          } else if (e < 150) {
            items.push({ type: rand() < 0.6 ? 'conifer' : 'deciduous', x, y, s: 1.15 + rand() * 0.35 });
            stepX = 11 + rand() * 6;
          } else if (e < 250) {
            if (rand() < 0.72) items.push({ type: rand() < 0.55 ? 'conifer' : 'deciduous', x, y, s: 0.95 + rand() * 0.3 });
            else items.push({ type: 'bush', x, y, s: 1.05 + rand() * 0.35 });
            stepX = 13 + rand() * 8;
          } else if (e < 330) {
            const r = rand();
            if (r < 0.28) items.push({ type: 'conifer', x, y, s: 0.75 + rand() * 0.22 });
            else if (r < 0.58) items.push({ type: 'bush', x, y, s: 0.9 + rand() * 0.3 });
            else items.push({ type: 'grass', x, y, s: 1.1 + rand() * 0.35 });
            stepX = 15 + rand() * 9;
          } else if (e < 430) {
            if (rand() < 0.8) items.push({ type: 'grass', x, y, s: 1.0 + rand() * 0.35 });
            stepX = 17 + rand() * 10;
          } else {
            if (rand() < 0.45) items.push({ type: 'grass', x, y, s: 0.7 + rand() * 0.25 });
            stepX = 20 + rand() * 12;
          }
          x += stepX;
        }

        const sheepOffsets = [-16, 13, 20];
        const sheep = sheepOffsets
          .map(off => plateau.x + off)
          .filter(sx => sx > xMin + 4 && sx < xMax - 4)
          .map(sx => ({ x: sx, y: yAtX(sx), s: 1.0 + rand() * 0.25 }));

        items.sort((a, b) => b.y - a.y);

        setVegetation({ items, peak, plateau, sheep });
      }, [step, profilePathD]);

      const vegBaseDelay = 0.2;
      const vegStagger = 0.045;
      const vegSpecialDelay = vegetation ? vegBaseDelay + vegetation.items.length * vegStagger + 0.4 : 0;

      const renderVegShape = (it) => {
        switch (it.type) {
          case 'conifer':
            return (
              <g transform={`translate(${it.x.toFixed(2)} ${it.y.toFixed(2)}) scale(${it.s.toFixed(2)})`}>
                <line x1="0" y1="0" x2="0" y2="-3.5" stroke="#6d4c2f" strokeWidth="1.4" />
                <polygon points="-4.2,-2.8 4.2,-2.8 0,-8.6" fill="#1b5e20" />
                <polygon points="-3.2,-6.4 3.2,-6.4 0,-11.2" fill="#2e7d32" />
              </g>
            );
          case 'deciduous':
            return (
              <g transform={`translate(${it.x.toFixed(2)} ${it.y.toFixed(2)}) scale(${it.s.toFixed(2)})`}>
                <line x1="0" y1="0" x2="0" y2="-4.5" stroke="#6d4c2f" strokeWidth="1.4" />
                <circle cx="0" cy="-7" r="3.6" fill="#43a047" />
                <circle cx="-2" cy="-5.8" r="2.2" fill="#388e3c" />
                <circle cx="2" cy="-5.8" r="2.2" fill="#4caf50" />
              </g>
            );
          case 'bush':
            return (
              <g transform={`translate(${it.x.toFixed(2)} ${it.y.toFixed(2)}) scale(${it.s.toFixed(2)})`}>
                <ellipse cx="0" cy="-1.6" rx="2.8" ry="1.8" fill="#558b2f" />
                <ellipse cx="-1.6" cy="-1" rx="1.8" ry="1.2" fill="#689f38" />
              </g>
            );
          case 'grass':
            return (
              <g transform={`translate(${it.x.toFixed(2)} ${it.y.toFixed(2)}) scale(${it.s.toFixed(2)})`} stroke="#7cb342" strokeWidth="0.7" strokeLinecap="round" fill="none">
                <path d="M 0 0 C 0 -1.5, -0.3 -2.5, -0.8 -3.2" />
                <path d="M 0 0 C 0.1 -1.8, 0.2 -2.6, 0.2 -3.6" />
                <path d="M 0 0 C 0.3 -1.4, 0.8 -2.2, 1.2 -2.9" />
              </g>
            );
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-800 flex flex-col md:flex-row">

          <aside className="w-full md:w-56 lg:w-64 bg-white border-r border-gray-200 p-4 md:p-4 lg:p-6 flex flex-col gap-4 lg:gap-5 shadow-sm z-50 relative">
            <div className="flex items-center gap-3 mb-1">
              <div className="p-2 bg-blue-50 text-blue-600 rounded-lg">
                <MapIcon size={24} />
              </div>
              <h1 className="text-xl font-bold text-gray-900 leading-tight">Höhenprofil</h1>
            </div>

            {/* 1. BERECHNUNG (jetzt ganz oben) */}
            <div className="space-y-2">
              <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider">Berechnung</h2>
              <div className="p-3 bg-gray-50 border border-gray-100 rounded-lg text-xs text-gray-600 leading-relaxed">
                {intersections === null ? (
                  <span>Schnittpunkte werden berechnet…</span>
                ) : (
                  <span>
                    <span className="font-bold text-green-700">✓ {intersections.length} Schnittpunkte</span> gefunden
                    <span className="block mt-1">{majorCount} auf Haupthöhenlinien, {minorCount} auf Nebenhöhenlinien</span>
                    {step >= 4 && (
                      <span className="block mt-1 text-blue-700 font-semibold">{profileDots.length} / {intersections.length} Punkte übertragen</span>
                    )}
                    {step >= 4 && linkedPoint && (
                      <span className="block mt-1 text-blue-700 font-semibold">🔗 Verknüpft: Kreuzpunkt auf {linkedPoint.elevation} m</span>
                    )}
                  </span>
                )}
              </div>
            </div>

            {/* 2. WERKZEUGE */}
            <div className="space-y-2">
              <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider">Werkzeuge</h2>
              <div className="flex gap-2 items-center">
                <button
                  onClick={() => setDrawMode(m => !m)}
                  title={drawMode ? "Bleistift ausschalten" : "Bleistift einschalten"}
                  className={`flex items-center justify-center p-2 rounded-lg transition-colors min-h-[36px] min-w-[36px] ${
                    drawMode
                      ? "bg-blue-600 text-white shadow-sm hover:bg-blue-700"
                      : "bg-gray-100 text-gray-700 hover:bg-gray-200"
                  }`}
                >
                  <PencilIcon size={16} />
                </button>

                <div className="flex gap-1.5 items-center">
                  {stiftFarben.map((f) => (
                    <button
                      key={f.wert}
                      onClick={() => { setDrawColor(f.wert); if (!drawMode) setDrawMode(true); }}
                      title={f.name}
                      className={`w-7 h-7 rounded-full border-2 transition-transform ${
                        drawColor === f.wert ? "border-gray-800 scale-110" : "border-gray-300 hover:scale-105"
                      }`}
                      style={{ backgroundColor: f.wert }}
                    />
                  ))}
                </div>

                <button
                  onClick={clearDrawing}
                  title="Zeichnung löschen"
                  className="flex items-center justify-center p-2 bg-red-50 text-red-600 border border-red-200 rounded-lg hover:bg-red-100 transition-colors ml-auto min-h-[36px] min-w-[36px]"
                >
                  <TrashIcon size={16} />
                </button>
              </div>
              {drawMode && (
                <p className="text-xs text-blue-700 font-semibold px-1">
                  ✏️ Zeichenmodus aktiv – zeichne über Karte und Diagramm.
                </p>
              )}
            </div>

            {/* 3. STEUERUNG */}
            <div className="space-y-2">
              <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider">Steuerung</h2>

              <div className="flex gap-2">
                <button
                  onClick={goBack}
                  disabled={backDisabled}
                  title="Schritt zurück"
                  className="flex-1 flex items-center justify-center p-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 disabled:opacity-50 transition-colors min-h-[40px]"
                >
                  <ChevronLeftIcon size={18} />
                </button>
                <button
                  onClick={goNext}
                  disabled={nextDisabled}
                  title="Nächster Schritt"
                  className="flex-1 flex items-center justify-center p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 transition-colors shadow-sm min-h-[40px]"
                >
                  <ChevronRightIcon size={18} />
                </button>
              </div>

              <div className="flex gap-2">
                <button
                  onClick={skipStep}
                  disabled={skipDisabled}
                  title="Überspringen"
                  className="flex-1 flex items-center justify-center p-2 bg-indigo-50 text-indigo-700 border border-indigo-200 rounded-lg hover:bg-indigo-100 disabled:opacity-50 transition-colors min-h-[40px]"
                >
                  <SkipForwardIcon size={16} />
                </button>
                <button
                  onClick={togglePause}
                  disabled={!pauseEnabled}
                  title={paused ? "Weiter" : "Pause"}
                  className={`flex-1 flex items-center justify-center p-2 rounded-lg transition-colors min-h-[40px] ${
                    pauseEnabled
                      ? (paused ? "bg-green-600 text-white hover:bg-green-700 shadow-sm" : "bg-amber-500 text-white hover:bg-amber-600 shadow-sm")
                      : "bg-gray-100 text-gray-400 cursor-not-allowed opacity-60"
                  }`}
                >
                  {paused ? <PlayIcon size={16} /> : <PauseIcon size={16} />}
                </button>
                <button
                  onClick={reset}
                  disabled={step === 0 && selectedLine === null}
                  title="Zurücksetzen"
                  className="flex-1 flex items-center justify-center p-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 disabled:opacity-50 transition-colors min-h-[40px]"
                >
                  <RotateCcwIcon size={16} />
                </button>
              </div>

              <div className="px-1 pt-1 text-xs text-gray-500">
                Schritt {step + 1} von {MAX_STEP + 1}: <span className="font-semibold text-gray-700">{stepNames[step]}</span>
                {sk(step) && <span className="block text-indigo-600 font-semibold mt-0.5">⏭ Übersprungen</span>}
                {step === 4 && walkerDone && <span className="block text-green-700 font-semibold mt-0.5">✓ Wanderpunkt fertig</span>}
                {step === 5 && <span className="block text-green-700 font-semibold mt-0.5">✓ Profillinie gezeichnet</span>}
                {step === 6 && <span className="block text-green-700 font-semibold mt-0.5">✓ Höhenschichten eingefärbt</span>}
                {step === 7 && <span className="block text-green-700 font-semibold mt-0.5">✓ Vegetation gesetzt</span>}
              </div>
            </div>

            {/* 4. ERKLÄRUNGEN */}
            <div className="space-y-2">
              <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider">Erklärungen</h2>
              <label className="flex items-center gap-2 cursor-pointer select-none px-1 py-1 min-h-[32px]">
                <input
                  type="checkbox"
                  checked={showExplanations}
                  onChange={(e) => setShowExplanations(e.target.checked)}
                  className="w-4 h-4 accent-blue-600 cursor-pointer"
                />
                <span className="text-xs text-gray-700">Erklärungen anzeigen</span>
              </label>
            </div>

            {/* 5. LEGENDE */}
            <div className="space-y-2">
              <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider">Legende</h2>
              <div className="space-y-1.5">
                <div className="flex items-center gap-2">
                  <svg width="28" height="10" className="flex-shrink-0">
                    <line x1="0" y1="5" x2="28" y2="5" stroke="#1d1d1b" strokeWidth="2.5" />
                  </svg>
                  <span className="text-xs text-gray-700">Profillinie</span>
                </div>
                {hoehenSchichten.map((s) => (
                  <div key={s.label} className="flex items-center gap-2">
                    <div
                      className="w-7 h-3 rounded-sm border border-gray-300 flex-shrink-0"
                      style={{ backgroundColor: s.farbe }}
                    ></div>
                    <span className="text-xs text-gray-700">{s.label}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* 6. INFO-BOX (unten) */}
            <div className="mt-auto bg-blue-50 border border-blue-100 p-4 rounded-lg">
              <div className="flex items-start gap-2 text-blue-800">
                <InfoIcon size={16} className="mt-0.5 flex-shrink-0" />
                <p className="text-xs leading-relaxed">
                  Tippe auf eine Höhenlinie (Touch: 1× = Tooltip, 2× = Auswahl).
                  {step >= 4 && (
                    <span className="block mt-2">
                      Tippe auf einen schwarzen Punkt im Diagramm oder einen Kreuzpunkt, um das Paar zu verknüpfen.
                    </span>
                  )}
                  {selectedLine && <span className="block mt-2 font-bold">Auswahl: {selectedLine} m</span>}
                </p>
              </div>
            </div>
          </aside>

          <main className="flex-1 p-4 md:p-6 lg:p-8 overflow-y-auto">
            <div ref={contentRef} className="relative flex flex-col items-center">

              {showExplanations && explanationContent[step] && (
                <motion.div
                  key={`explain-${step}`}
                  initial={{ opacity: 0, y: -8 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ duration: 0.4 }}
                  className="w-full max-w-4xl mb-3 bg-amber-50 border border-amber-300 rounded-lg px-4 py-3 shadow-sm"
                >
                  <div className="flex items-start gap-2">
                    <InfoIcon size={16} className="mt-0.5 flex-shrink-0 text-amber-600" />
                    <div className="text-sm text-gray-800 leading-relaxed space-y-1">
                      {explanationContent[step]}
                    </div>
                  </div>
                </motion.div>
              )}

              <div className="w-full max-w-4xl bg-white rounded-xl shadow-sm border border-gray-300 overflow-hidden flex flex-col">

                <div
                  className="relative w-full border-b border-gray-300 bg-[#fafafa] p-4 flex justify-center"
                  onPointerMove={handleMapPointer}
                  onPointerDown={handleMapPointer}
                >
                  {hoveredElevation && (
                    <div
                      className="absolute pointer-events-none bg-white text-gray-800 text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm border border-gray-300 z-50"
                      style={{
                        left: mousePos.x + 12,
                        top: mousePos.y + 12,
                        transform: 'translate(0, -50%)'
                      }}
                    >
                      {hoveredElevation}
                    </div>
                  )}

                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox={`${sharedViewBoxX} 0 ${sharedViewBoxWidth} ${mapHeight + 20}`}
                    className="w-full h-auto"
                  >
                    <g id="contour-lines">
                      {contourPaths.map((line, index) => {
                        const isSelected = selectedLine === line.elevation;
                        const isHovered = hoveredElevation === line.elevation;
                        const defaultStrokeWidth = line.isMajor ? "1.5" : "0.75";

                        let strokeColor = "#1d1d1b";
                        if (isSelected) strokeColor = "#2563eb";
                        else if (isHovered) strokeColor = "#60a5fa";

                        return (
                          <g key={index}>
                            <path
                              id={line.id}
                              d={line.d}
                              fill="none"
                              stroke={strokeColor}
                              strokeWidth={isSelected ? "3" : defaultStrokeWidth}
                              strokeMiterlimit="10"
                              className="pointer-events-none transition-all duration-200"
                            />
                            <path
                              d={line.d}
                              fill="none"
                              stroke="transparent"
                              strokeWidth="22"
                              className="hit-area"
                              onPointerEnter={(e) => {
                                if (e.pointerType === 'mouse' || e.pointerType === 'pen') {
                                  setHoveredElevation(line.elevation);
                                }
                              }}
                              onPointerLeave={(e) => {
                                if (e.pointerType === 'mouse' || e.pointerType === 'pen') {
                                  setHoveredElevation(null);
                                }
                              }}
                              onPointerDown={(e) => handleLineActivate(line, e)}
                            />
                          </g>
                        );
                      })}
                    </g>

                    <g id="text-labels" fill="#1d1d1b" fontFamily="sans-serif" fontSize="9" fontWeight="bold" letterSpacing="0.03em" className="pointer-events-none">
                      {textLabels.map((lbl, idx) => (
                        <text key={idx} transform={lbl.transform}>
                          <tspan x="0" y="0">{lbl.text}</tspan>
                        </text>
                      ))}
                    </g>

                    <motion.line
                      key={`cutline-${sk(1)}`}
                      id="Schnittlinie"
                      stroke="#e3051c"
                      strokeWidth="2"
                      fill="none"
                      x1="0"
                      y1={cutLineY}
                      x2={mapWidth}
                      y2={cutLineY}
                      initial={{ pathLength: 0, opacity: 0 }}
                      animate={{
                        pathLength: step >= 1 ? 1 : 0,
                        opacity: step >= 1 ? 1 : 0
                      }}
                      transition={{ duration: sk(1) ? 0 : 1.5, ease: "easeInOut" }}
                      className="pointer-events-none"
                    />

                    <motion.g
                      key={`cutmarker-${sk(1)}`}
                      initial={{ opacity: 0 }}
                      animate={{ opacity: step >= 1 ? 1 : 0 }}
                      transition={{ duration: sk(1) ? 0 : 0.5, delay: sk(1) ? 0 : 1.5 }}
                      className="pointer-events-none"
                    >
                      <line x1="0" y1={cutLineY - 12} x2="0" y2={cutLineY + 12} stroke="#1d1d1b" strokeWidth="2.5" />
                      <line x1={mapWidth} y1={cutLineY - 12} x2={mapWidth} y2={cutLineY + 12} stroke="#1d1d1b" strokeWidth="2.5" />
                    </motion.g>

                    {dash && (
                      <line
                        x1={dash.x} y1={cutLineY}
                        x2={dash.x} y2={mapHeight + 20}
                        stroke="#1d1d1b" strokeWidth="0.6"
                        strokeDasharray="3 3"
                        className="pointer-events-none"
                      />
                    )}

                    {linkedPoint && (
                      <g className="pointer-events-none">
                        <line
                          x1={linkedPoint.x} y1={cutLineY}
                          x2={linkedPoint.x} y2={mapHeight + 20}
                          stroke="#2563eb" strokeWidth="0.8"
                          strokeDasharray="3 3"
                        />
                        <circle cx={linkedPoint.x} cy={cutLineY} r="4" fill="none" stroke="#2563eb" strokeWidth="1">
                          <animate attributeName="r" values="4;10;4" dur="2.2s" repeatCount="indefinite" />
                          <animate attributeName="opacity" values="0.9;0;0.9" dur="2.2s" repeatCount="indefinite" />
                        </circle>
                        <circle cx={linkedPoint.x} cy={cutLineY} r="3.5" fill="#2563eb" stroke="#ffffff" strokeWidth="0.8" />
                        <rect
                          x={linkedLabelFlip ? linkedPoint.x - 40 : linkedPoint.x + 9}
                          y={cutLineY - 21}
                          width="31"
                          height="13"
                          rx="2.5"
                          fill="#ffffff"
                          stroke="#2563eb"
                          strokeWidth="0.8"
                          opacity="0.95"
                        />
                        <text
                          x={linkedLabelFlip ? linkedPoint.x - 24.5 : linkedPoint.x + 24.5}
                          y={cutLineY - 11.5}
                          fontSize="8.5"
                          fontFamily="sans-serif"
                          fontWeight="bold"
                          fill="#2563eb"
                          textAnchor="middle"
                        >
                          {linkedPoint.elevation} m
                        </text>
                      </g>
                    )}

                    {walker.visible && (
                      <g className="pointer-events-none">
                        {walker.pulsing && (
                          <circle cx={walker.x} cy={cutLineY} r="4" fill="none" stroke="#e3051c" strokeWidth="1">
                            <animate attributeName="r" values="4;11;4" dur="1.8s" repeatCount="indefinite" />
                            <animate attributeName="opacity" values="0.9;0;0.9" dur="1.8s" repeatCount="indefinite" />
                          </circle>
                        )}
                        <circle cx={walker.x} cy={cutLineY} r="3.5" fill="#e3051c" stroke="#ffffff" strokeWidth="0.8" />
                      </g>
                    )}

                    {walker.visible && walker.pulsing && dash && (
                      <g className="pointer-events-none">
                        <rect
                          x={walkerLabelFlip ? walker.x - 40 : walker.x + 9}
                          y={cutLineY - 21}
                          width="31"
                          height="13"
                          rx="2.5"
                          fill="#ffffff"
                          stroke="#e3051c"
                          strokeWidth="0.8"
                          opacity="0.95"
                        />
                        <text
                          x={walkerLabelFlip ? walker.x - 24.5 : walker.x + 24.5}
                          y={cutLineY - 11.5}
                          fontSize="8.5"
                          fontFamily="sans-serif"
                          fontWeight="bold"
                          fill="#e3051c"
                          textAnchor="middle"
                        >
                          {dash.elevation} m
                        </text>
                      </g>
                    )}

                    {step >= 4 && (
                      <g id="cross-hits">
                        {profileDots.map((d, i) => (
                          <circle
                            key={`hit-${i}`}
                            cx={d.x}
                            cy={cutLineY}
                            r="11"
                            fill="transparent"
                            className="hit-area"
                            onPointerDown={() => toggleLinkedPoint(d)}
                          />
                        ))}
                      </g>
                    )}

                    {showExplanations && step === 1 && (
                      <PulsingArrow tx={-4} ty={cutLineY} angle={0} length={30} />
                    )}
                    {showExplanations && step === 3 && (
                      <PulsingArrow tx={-6} ty={mapHeight + 12} angle={0} length={30} />
                    )}
                    {showExplanations && step === 4 && firstCross && (
                      <PulsingArrow tx={firstCross.x - 7} ty={cutLineY} angle={0} length={26} />
                    )}

                    <text
                      x="0"
                      y={mapHeight + 15}
                      fontSize="9"
                      fontFamily="sans-serif"
                      fontWeight="bold"
                      fill="#1f2937"
                      className="pointer-events-none"
                    >
                      Maßstab 1:20.000
                    </text>
                  </svg>
                </div>

                <div className="relative w-full p-4 bg-white flex justify-center">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox={`${sharedViewBoxX} 0 ${sharedViewBoxWidth} ${profileHeight}`}
                    className="w-full h-auto"
                  >
                    <defs>
                      <pattern id="mm-small" width={mmInSvg} height={mmInSvg} patternUnits="userSpaceOnUse">
                        <path d={`M ${mmInSvg} 0 L 0 0 0 ${mmInSvg}`} fill="none" stroke="#fdba74" strokeWidth="0.3" opacity="0.5" />
                      </pattern>
                      <pattern id="mm-large" width={cmInSvg} height={cmInSvg} patternUnits="userSpaceOnUse" patternTransform={`translate(0, ${gridOffsetY})`}>
                        <rect width={cmInSvg} height={cmInSvg} fill="url(#mm-small)" />
                        <path d={`M ${cmInSvg} 0 L 0 0 0 ${cmInSvg}`} fill="none" stroke="#f97316" strokeWidth="0.8" opacity="0.9" />
                      </pattern>

                      {schichtenBottomUp.map((s, i) => {
                        const isTop = s.bis >= 500;
                        const yTop = isTop ? 10 : elevationToY(s.bis);
                        const yBottom = elevationToY(s.von);
                        return (
                          <clipPath key={`clip-${s.von}`} id={`schicht-clip-${s.von}`}>
                            <rect x="0" y={yTop} width={mapWidth} height={yBottom - yTop} />
                          </clipPath>
                        );
                      })}
                    </defs>

                    <rect x="0" y="10" width={mapWidth} height={chartBaseY - 10} fill="url(#mm-large)" />

                    {step >= 6 && areaPathD && (
                      <g id="hoehenschichten" className="pointer-events-none">
                        {schichtenBottomUp.map((s, i) => (
                          <motion.path
                            key={`schicht-${s.von}-${sk(6)}`}
                            d={areaPathD}
                            fill={s.farbe}
                            stroke="none"
                            clipPath={`url(#schicht-clip-${s.von})`}
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 0.85 }}
                            transition={{ duration: sk(6) ? 0 : 0.8, delay: sk(6) ? 0 : (step === 6 ? i * 0.6 : 0), ease: "easeOut" }}
                          />
                        ))}
                      </g>
                    )}

                    {dash && (
                      <line
                        x1={dash.x} y1="10"
                        x2={dash.x} y2={elevationToY(dash.elevation)}
                        stroke="#1d1d1b" strokeWidth="0.6"
                        strokeDasharray="3 3"
                        className="pointer-events-none"
                      />
                    )}

                    {linkedPoint && (
                      <g className="pointer-events-none">
                        <line
                          x1={linkedPoint.x} y1="10"
                          x2={linkedPoint.x} y2={elevationToY(linkedPoint.elevation)}
                          stroke="#2563eb" strokeWidth="0.8"
                          strokeDasharray="3 3"
                        />
                        <circle cx={linkedPoint.x} cy={elevationToY(linkedPoint.elevation)} r="4" fill="none" stroke="#2563eb" strokeWidth="1">
                          <animate attributeName="r" values="4;9;4" dur="2.2s" repeatCount="indefinite" />
                          <animate attributeName="opacity" values="0.9;0;0.9" dur="2.2s" repeatCount="indefinite" />
                        </circle>
                        <circle cx={linkedPoint.x} cy={elevationToY(linkedPoint.elevation)} r="2.6" fill="#2563eb" stroke="#ffffff" strokeWidth="0.7" />
                      </g>
                    )}

                    {step >= 5 && profilePathD && (
                      <motion.path
                        key={`profil-${sk(5)}`}
                        d={profilePathD}
                        fill="none"
                        stroke="#1d1d1b"
                        strokeWidth="2.5"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        initial={{ pathLength: 0 }}
                        animate={{ pathLength: 1 }}
                        transition={{ duration: sk(5) ? 0 : 3, ease: "easeInOut" }}
                        className="pointer-events-none"
                      />
                    )}

                    <g id="profile-dots">
                      {profileDots.map((d, i) => (
                        <g key={i}>
                          <circle
                            cx={d.x}
                            cy={elevationToY(d.elevation)}
                            r="2.2"
                            fill="#1d1d1b"
                            className="pointer-events-none"
                          />
                          <circle
                            cx={d.x}
                            cy={elevationToY(d.elevation)}
                            r="11"
                            fill="transparent"
                            className="hit-area"
                            onPointerDown={() => toggleLinkedPoint(d)}
                          />
                        </g>
                      ))}
                    </g>

                    {step >= 7 && vegetation && (
                      <g id="vegetation" className="pointer-events-none">
                        {vegetation.items.map((it, i) => (
                          <motion.g
                            key={`veg-${i}-${sk(7)}`}
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ duration: sk(7) ? 0 : 0.4, delay: sk(7) ? 0 : vegBaseDelay + i * vegStagger }}
                          >
                            {renderVegShape(it)}
                          </motion.g>
                        ))}

                        <motion.g
                          key={`haus-${sk(7)}`}
                          initial={{ opacity: 0 }}
                          animate={{ opacity: 1 }}
                          transition={{ duration: sk(7) ? 0 : 0.6, delay: sk(7) ? 0 : vegSpecialDelay }}
                        >
                          <g transform={`translate(${vegetation.plateau.x.toFixed(2)} ${vegetation.plateau.y.toFixed(2)})`}>
                            <rect x="-8" y="-6.5" width="16" height="6.5" fill="#a89a88" stroke="#6d6055" strokeWidth="0.6" />
                            <g stroke="#6d6055" strokeWidth="0.3">
                              <rect x="-7.6" y="-1.9" width="3.0" height="1.6" rx="0.5" fill="#b8a995" />
                              <rect x="-4.3" y="-1.9" width="2.4" height="1.6" rx="0.5" fill="#9c8e7c" />
                              <rect x="2.0" y="-1.9" width="2.8" height="1.6" rx="0.5" fill="#b3a48f" />
                              <rect x="5.1" y="-1.9" width="2.4" height="1.6" rx="0.5" fill="#a3957f" />
                              <rect x="-7.7" y="-3.8" width="2.4" height="1.6" rx="0.5" fill="#a3957f" />
                              <rect x="-5.0" y="-3.8" width="2.9" height="1.6" rx="0.5" fill="#b8a995" />
                              <rect x="2.3" y="-3.8" width="2.3" height="1.6" rx="0.5" fill="#9c8e7c" />
                              <rect x="4.9" y="-3.8" width="2.7" height="1.6" rx="0.5" fill="#b3a48f" />
                              <rect x="-7.6" y="-5.7" width="2.7" height="1.6" rx="0.5" fill="#b3a48f" />
                              <rect x="-4.6" y="-5.7" width="2.3" height="1.6" rx="0.5" fill="#a3957f" />
                              <rect x="-2.0" y="-5.7" width="2.9" height="1.6" rx="0.5" fill="#b8a995" />
                              <rect x="1.2" y="-5.7" width="2.5" height="1.6" rx="0.5" fill="#9c8e7c" />
                              <rect x="4.0" y="-5.7" width="3.4" height="1.6" rx="0.5" fill="#b3a48f" />
                            </g>
                            <polygon points="-9.4,-6.5 9.4,-6.5 0,-12.2" fill="#6d5240" stroke="#4e3a2c" strokeWidth="0.6" strokeLinejoin="round" />
                            <line x1="-6.2" y1="-8.4" x2="6.2" y2="-8.4" stroke="#4e3a2c" strokeWidth="0.4" />
                            <line x1="-3.1" y1="-10.3" x2="3.1" y2="-10.3" stroke="#4e3a2c" strokeWidth="0.4" />
                            <rect x="4.0" y="-11" width="1.9" height="3.4" fill="#8d8073" stroke="#6d6055" strokeWidth="0.4" />
                            <line x1="4.0" y1="-9.9" x2="5.9" y2="-9.9" stroke="#6d6055" strokeWidth="0.3" />
                            <rect x="-2.2" y="-4.6" width="2.8" height="4.6" fill="#4e342e" rx="0.4" />
                            <line x1="-1.3" y1="-4.4" x2="-1.3" y2="-0.2" stroke="#3e2723" strokeWidth="0.3" />
                            <line x1="-0.4" y1="-4.4" x2="-0.4" y2="-0.2" stroke="#3e2723" strokeWidth="0.3" />
                            <rect x="2.5" y="-4.7" width="2.4" height="2.0" fill="#2e2620" stroke="#5d4037" strokeWidth="0.6" />
                          </g>
                        </motion.g>

                        {vegetation.sheep.map((sh, i) => (
                          <motion.g
                            key={`sheep-${i}-${sk(7)}`}
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ duration: sk(7) ? 0 : 0.5, delay: sk(7) ? 0 : vegSpecialDelay + 0.3 + i * 0.2 }}
                          >
                            <g transform={`translate(${sh.x.toFixed(2)} ${sh.y.toFixed(2)}) scale(${sh.s.toFixed(2)})`}>
                              <line x1="-1.4" y1="0" x2="-1.4" y2="-1.6" stroke="#757575" strokeWidth="0.5" />
                              <line x1="1.2" y1="0" x2="1.2" y2="-1.6" stroke="#757575" strokeWidth="0.5" />
                              <ellipse cx="0" cy="-2.6" rx="2.4" ry="1.5" fill="#f5f5f5" stroke="#9e9e9e" strokeWidth="0.45" />
                              <circle cx="2.3" cy="-3.1" r="0.85" fill="#424242" />
                            </g>
                          </motion.g>
                        ))}

                        <motion.g
                          key={`turm-${sk(7)}`}
                          initial={{ opacity: 0 }}
                          animate={{ opacity: 1 }}
                          transition={{ duration: sk(7) ? 0 : 0.6, delay: sk(7) ? 0 : vegSpecialDelay + 0.9 }}
                        >
                          <g transform={`translate(${vegetation.peak.x.toFixed(2)} ${vegetation.peak.y.toFixed(2)})`}>
                            <rect x="-3" y="-11" width="6" height="11" fill="#bdbdbd" stroke="#757575" strokeWidth="0.6" />
                            <rect x="-3.6" y="-13" width="1.9" height="2.2" fill="#bdbdbd" stroke="#757575" strokeWidth="0.5" />
                            <rect x="-0.95" y="-13" width="1.9" height="2.2" fill="#bdbdbd" stroke="#757575" strokeWidth="0.5" />
                            <rect x="1.7" y="-13" width="1.9" height="2.2" fill="#bdbdbd" stroke="#757575" strokeWidth="0.5" />
                            <path d="M -1.3 0 L -1.3 -2.8 A 1.3 1.3 0 0 1 1.3 -2.8 L 1.3 0 Z" fill="#5d4037" />
                            <rect x="-0.8" y="-8.6" width="1.6" height="2.2" rx="0.6" fill="#37474f" />
                          </g>
                        </motion.g>
                      </g>
                    )}

                    <g id="Chart-Axes">
                      <motion.line key={`axL-${sk(2)}`} x1="0" y1={chartBaseY} x2="0" y2="10" stroke="#1f2937" strokeWidth="1.5" initial={{ pathLength: 0, opacity: 0 }} animate={{ pathLength: step >= 2 ? 1 : 0, opacity: step >= 2 ? 1 : 0 }} transition={{ duration: sk(2) ? 0 : 1, ease: "easeOut" }} />
                      <motion.line key={`axR-${sk(2)}`} x1={mapWidth} y1={chartBaseY} x2={mapWidth} y2="10" stroke="#1f2937" strokeWidth="1.5" initial={{ pathLength: 0, opacity: 0 }} animate={{ pathLength: step >= 2 ? 1 : 0, opacity: step >= 2 ? 1 : 0 }} transition={{ duration: sk(2) ? 0 : 1, ease: "easeOut" }} />
                      <motion.line key={`axB-${sk(2)}`} x1="0" y1={chartBaseY} x2={mapWidth} y2={chartBaseY} stroke="#1f2937" strokeWidth="1.5" initial={{ pathLength: 0, opacity: 0 }} animate={{ pathLength: step >= 2 ? 1 : 0, opacity: step >= 2 ? 1 : 0 }} transition={{ duration: sk(2) ? 0 : 1, ease: "easeOut", delay: sk(2) ? 0 : 0.5 }} />

                      <motion.g key={`labels-${sk(3)}`} initial={{ opacity: 0 }} animate={{ opacity: step >= 3 ? 1 : 0 }} transition={{ duration: sk(3) ? 0 : 0.8, delay: sk(3) ? 0 : 0.2 }}>

                        {[100, 200, 300, 400, 500, 600].map((elevation) => {
                          const yPos = chartBaseY - (elevation / 100) * cmInSvg;
                          const isSelected = selectedLine === elevation;

                          return (
                            <g key={`y-tick-${elevation}`}>
                              <line x1="-4" y1={yPos} x2="0" y2={yPos} stroke={isSelected ? "#2563eb" : "#1f2937"} strokeWidth={isSelected ? "2" : "1.5"} />
                              <text x="-8" y={yPos + 2.5} fontSize="8" fontFamily="sans-serif" textAnchor="end" fill={isSelected ? "#2563eb" : "#4b5563"} fontWeight={isSelected ? "bold" : "normal"}>{elevation}</text>

                              <line x1={mapWidth} y1={yPos} x2={mapWidth + 4} y2={yPos} stroke={isSelected ? "#2563eb" : "#1f2937"} strokeWidth={isSelected ? "2" : "1.5"} />
                              <text x={mapWidth + 8} y={yPos + 2.5} fontSize="8" fontFamily="sans-serif" textAnchor="start" fill={isSelected ? "#2563eb" : "#4b5563"} fontWeight={isSelected ? "bold" : "normal"}>{elevation}</text>
                            </g>
                          );
                        })}

                        <text x="-25" y="8" fontSize="9" fontFamily="sans-serif" fontWeight="bold" fill="#1f2937">Höhe [m]</text>
                        <text x={mapWidth + 8} y="8" fontSize="9" fontFamily="sans-serif" fontWeight="bold" fill="#1f2937">Höhe [m]</text>

                        {[...Array(16)].map((_, i) => {
                          const xPos = i * cmInSvg;
                          const value = i * 200;
                          return (
                            <g key={`x-tick-${i}`}>
                              <line x1={xPos} y1={chartBaseY} x2={xPos} y2={chartBaseY + 5} stroke="#1f2937" strokeWidth="1.5" />
                              <text x={xPos} y={chartBaseY + 16} fontSize="8" fontFamily="sans-serif" textAnchor="middle" fill="#4b5563">{value}</text>
                            </g>
                          );
                        })}

                        <text x={mapWidth / 2} y={chartBaseY + 32} fontSize="9" fontFamily="sans-serif" fontWeight="bold" fill="#1f2937" textAnchor="middle">
                          Länge der Schnittlinie in Metern (Gesamt: 3.000 m)
                        </text>

                      </motion.g>
                    </g>

                    {showExplanations && step === 3 && (
                      <g>
                        <PulsingArrow tx={-24} ty={elevationToY(300)} angle={0} length={26} />
                        <PulsingArrow tx={-7} ty={chartBaseY + 14} angle={0} length={26} />
                      </g>
                    )}
                    {showExplanations && step === 4 && firstDot && (
                      <PulsingArrow tx={firstDot.x - 7} ty={elevationToY(firstDot.elevation)} angle={0} length={26} />
                    )}
                    {showExplanations && step === 5 && peakCurvePt && (
                      <PulsingArrow tx={peakCurvePt.x} ty={peakCurvePt.y - 4} angle={90} length={30} />
                    )}
                    {showExplanations && step === 6 && areaFirstPt && (
                      <PulsingArrow tx={areaFirstPt.x - 4} ty={elevationToY(50)} angle={0} length={24} />
                    )}
                  </svg>
                </div>
              </div>

              <canvas
                ref={canvasRef}
                onPointerDown={handleDrawStart}
                onPointerMove={handleDrawMove}
                onPointerUp={handleDrawEnd}
                onPointerCancel={handleDrawEnd}
                className="absolute inset-0 z-40"
                style={{
                  pointerEvents: drawMode ? 'auto' : 'none',
                  cursor: drawMode ? 'crosshair' : 'default',
                  touchAction: drawMode ? 'none' : 'auto'
                }}
              />
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ElevationProfileApp />);
  </script>
</body>
</html>
