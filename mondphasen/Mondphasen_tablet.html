<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mondphasen Erklärungs-App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        button, input[type="range"] {
            touch-action: manipulation;
        }
        .moon-orbit {
            stroke-dasharray: 10 10;
        }
        @keyframes pulse-aura {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .aura {
            animation: pulse-aura 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dot-group {
            cursor: pointer;
        }
        .dot-group:hover .core-dot {
            fill: #64748b;
        }

        /* Schritt 5 – Slider Touch-Tuning */
        #daySlider {
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        #daySlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            border: 3px solid #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
        #daySlider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            border: 3px solid #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <div class="max-w-screen-2xl w-full bg-white rounded-2xl shadow-xl p-6 md:p-10 flex flex-col lg:flex-row gap-10">
        
        <!-- Linke Seite: Das Diagramm -->
        <div class="flex-1 relative">
            <h1 class="text-3xl lg:text-4xl font-bold text-slate-800 mb-8 text-center">Die Entstehung der Mondphasen</h1>
            
            <svg id="diagram" viewBox="-250 -50 1750 1100" class="w-full h-auto max-w-5xl mx-auto">
                <defs>
                    <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                    </marker>
                    <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
                    </marker>
                    <marker id="arrowYellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24" />
                    </marker>

                    <!-- Unsichtbare Pfade für die gebogene Textausrichtung -->
                    <path id="textPathWaxing" d="M 260 260 A 340 340 0 0 1 740 260" fill="none" />
                    <path id="textPathWaning" d="M 260 740 A 340 340 0 0 0 740 740" fill="none" />
                </defs>

                <!-- Sonneneinstrahlung -->
                <g class="sun-rays" stroke="#fbbf24" stroke-width="4" marker-start="url(#arrowYellow)">
                    <line x1="1300" y1="250" x2="1430" y2="250" />
                    <line x1="1300" y1="500" x2="1430" y2="500" />
                    <line x1="1300" y1="750" x2="1430" y2="750" />
                </g>
                <text x="1365" y="470" text-anchor="middle" fill="#d97706" font-size="26" font-weight="bold">Sonneneinstrahlung</text>

                <!-- Umlaufbahn -->
                <circle cx="500" cy="500" r="280" fill="none" stroke="#94a3b8" stroke-width="3" class="moon-orbit" />

                <!-- Zunehmender / Abnehmender Mond Pfeile (Standardmäßig ausgeblendet) -->
                <g id="phase-arrows" style="display: none;">
                    <!-- Zunehmend Pfeil (Oben) -->
                    <path d="M 740 260 A 340 340 0 0 0 260 260" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowRed)" />
                    <text fill="#ef4444" font-size="26" font-weight="bold" dy="-15">
                        <textPath href="#textPathWaxing" startOffset="50%" text-anchor="middle">Zunehmender Mond</textPath>
                    </text>

                    <!-- Abnehmend Pfeil (Unten) -->
                    <path d="M 260 740 A 340 340 0 0 0 740 740" fill="none" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrowBlue)" />
                    <text fill="#3b82f6" font-size="26" font-weight="bold" dy="35">
                        <textPath href="#textPathWaning" startOffset="50%" text-anchor="middle">Abnehmender Mond</textPath>
                    </text>
                </g>

                <!-- Erde -->
                <g transform="translate(500, 500)">
                    <circle cx="0" cy="0" r="60" fill="#fff" stroke="#000" stroke-width="2" />
                    <path d="M 0 -60 A 60 60 0 0 0 0 60 Z" fill="#52525b" />
                    <text x="15" y="7" font-size="20" font-weight="bold" fill="#000">Erde</text>
                </g>

                <!-- Container für die pulsierenden Punkte und Labels -->
                <g id="waypoints-container"></g>
                <!-- Labels standardmäßig ausgeblendet -->
                <g id="labels-container" style="display: none;"></g>

                <!-- Der dynamische Mond -->
                <g id="dynamic-moon">
                    <!-- Schattenseite (Standardmäßig ausgeblendet) -->
                    <path id="moon-shadow" d="M 0 -50 A 50 50 0 0 0 0 50 Z" fill="#52525b" style="display: none;" />
                    
                    <!-- Beleuchtete Seite (immer sichtbar) -->
                    <path d="M 0 -50 A 50 50 0 0 1 0 50 Z" fill="#ffffff" />
                    
                    <!-- Sichtbare Seite / Roter Bereich (Standardmäßig ausgeblendet) -->
                    <g id="visible-side-group" style="display: none;">
                        <line id="moon-arrow" x1="0" y1="0" x2="0" y2="0" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowRed)" />
                        <g id="moon-visible-group">
                            <path d="M 0 -50 A 50 50 0 0 0 0 50 Z" fill="rgba(239, 68, 68, 0.5)" />
                        </g>
                    </g>

                    <!-- Mond Umriss -->
                    <circle cx="0" cy="0" r="50" fill="none" stroke="#000" stroke-width="2" />
                </g>

            </svg>

            <!-- Legende -->
            <div class="mt-8 flex flex-wrap justify-center gap-8 text-lg text-slate-700 font-medium">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full border-2 border-black flex overflow-hidden">
                        <div class="w-1/2 h-full bg-slate-700"></div>
                        <div class="w-1/2 h-full bg-white"></div>
                    </div>
                    <span>Schatten- / Beleuchtete Seite</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full border-2 border-black bg-red-500 opacity-50"></div>
                    <span>Sichtbare Seite (transparent)</span>
                </div>
            </div>
        </div>

        <!-- Rechte Seite: Interaktion & Ansicht -->
        <div class="w-full lg:w-80 xl:w-96 flex flex-col gap-6 bg-slate-50 p-8 rounded-2xl border border-slate-200 shrink-0">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 mb-3">Interaktive Ansicht</h2>
                <p class="text-base text-slate-600 mb-6">Bewege den Regler oder klicke auf die grauen Punkte im Diagramm.</p>
                
                <label for="daySlider" class="block text-lg font-medium text-slate-700 mb-2">Tag im Mondzyklus: <span id="dayDisplay" class="font-bold text-blue-600 text-xl">1</span></label>
                <input type="range" id="daySlider" min="1" max="29" value="1" class="w-full h-4 bg-slate-300 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="flex flex-col items-center justify-center bg-slate-900 rounded-2xl p-8 shadow-inner relative overflow-hidden min-h-[350px]">
                <h3 class="text-white text-lg font-semibold absolute top-5 left-5 z-10">Ansicht von der Erde</h3>
                
                <!-- Mondphasen-Ansicht -->
                <div class="relative w-48 h-48 mt-6">
                    <div class="absolute inset-0 rounded-full bg-slate-800"></div>
                    <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full">
                        <path id="moonPhasePath" d="" fill="#fef08a" />
                    </svg>
                    <div class="absolute inset-0 rounded-full pointer-events-none" style="box-shadow: inset -15px -15px 30px rgba(0,0,0,0.5);"></div>
                </div>

                <div id="phaseName" class="mt-8 text-yellow-200 font-bold text-2xl tracking-wide text-center h-10">Neumond</div>
            </div>

            <!-- Anzeigeoptionen (Toggles) -->
            <div class="mt-2 flex flex-col gap-3">
                <h3 class="text-lg font-bold text-slate-800 mb-1">Anzeigeoptionen</h3>
                <button id="btn-arrows" class="text-left px-4 py-3 rounded-xl font-semibold transition-colors duration-200 bg-slate-200 text-slate-600 hover:bg-slate-300">
                    Pfeile "Zunehmend/Abnehmend"
                </button>
                <button id="btn-labels" class="text-left px-4 py-3 rounded-xl font-semibold transition-colors duration-200 bg-slate-200 text-slate-600 hover:bg-slate-300">
                    Positions-Labels
                </button>
                <button id="btn-visible" class="text-left px-4 py-3 rounded-xl font-semibold transition-colors duration-200 bg-slate-200 text-slate-600 hover:bg-slate-300">
                    Sichtbare Seite (Rot)
                </button>
                <button id="btn-shadow" class="text-left px-4 py-3 rounded-xl font-semibold transition-colors duration-200 bg-slate-200 text-slate-600 hover:bg-slate-300">
                    Schattenseite des Mondes
                </button>
            </div>
        </div>

    </div>

    <script>
        const cx = 500;
        const cy = 500;
        const orbitRadius = 280;
        const labelRadius = 410;
        const labelWidth = 220;
        const labelHeight = 72;
        
        const waypoints = [
            { day: 1,  name: "Neumond" },
            { day: 4,  name: "Zunehmender Sichelmond" },
            { day: 8,  name: "Zunehmender Halbmond" },
            { day: 11, name: "Zunehmender 3/4 Mond" },
            { day: 15, name: "Vollmond" },
            { day: 18, name: "Abnehmender 3/4 Mond" },
            { day: 22, name: "Abnehmender Halbmond" },
            { day: 26, name: "Abnehmender Sichelmond" }
        ];

        // Map Tag → Name für schnellen Lookup
        const dayToName = {};
        waypoints.forEach(wp => { dayToName[wp.day] = wp.name; });

        const waypointsContainer = document.getElementById('waypoints-container');
        const labelsContainer = document.getElementById('labels-container');
        const daySlider = document.getElementById('daySlider');
        
        const dynamicMoon = document.getElementById('dynamic-moon');
        const moonVisibleGroup = document.getElementById('moon-visible-group');
        const moonArrow = document.getElementById('moon-arrow');

        const dayDisplay = document.getElementById('dayDisplay');
        const moonPhasePath = document.getElementById('moonPhasePath');
        const phaseName = document.getElementById('phaseName');

        waypoints.forEach(wp => {
            const angle = -((wp.day - 1) / 28) * 360;
            const rad = angle * (Math.PI / 180);
            
            const x = cx + orbitRadius * Math.cos(rad);
            const y = cy + orbitRadius * Math.sin(rad);

            const labelX = cx + labelRadius * Math.cos(rad);
            const labelY = cy + labelRadius * Math.sin(rad);

            // --- Wegpunkt ---
            const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
            group.setAttribute("class", "dot-group");
            group.setAttribute("transform", `translate(${x}, ${y})`);
            
            const handleSelect = (e) => {
                if (e && e.preventDefault) e.preventDefault();
                daySlider.value = wp.day;
                updateMoonPhase(wp.day);
            };
            group.addEventListener('pointerdown', handleSelect);
            group.addEventListener('pointercancel', () => {});

            const aura = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            aura.setAttribute("r", "20");
            aura.setAttribute("fill", "#cbd5e1");
            aura.setAttribute("class", "aura");
            
            const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("r", "10");
            dot.setAttribute("fill", "#94a3b8");
            dot.setAttribute("class", "core-dot transition-colors duration-200");

            const hitArea = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            hitArea.setAttribute("r", "45");
            hitArea.setAttribute("fill", "transparent");

            group.appendChild(aura);
            group.appendChild(dot);
            group.appendChild(hitArea);
            waypointsContainer.appendChild(group);

            // --- Label ---
            const fo = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
            
            let foX = labelX;
            let foY = labelY - labelHeight / 2;
            
            if (Math.cos(rad) > 0.1) {
                foX = labelX; 
            } else if (Math.cos(rad) < -0.1) {
                foX = labelX - labelWidth; 
            } else {
                foX = labelX - labelWidth / 2; 
                foY = labelY + (Math.sin(rad) > 0 ? 25 : -labelHeight - 25);
            }

            fo.setAttribute("x", foX);
            fo.setAttribute("y", foY);
            fo.setAttribute("width", labelWidth);
            fo.setAttribute("height", labelHeight);
            fo.style.overflow = "visible";

            const div = document.createElement("div");
            div.className = "w-full h-full bg-white border-2 border-slate-200 shadow-lg rounded-xl px-3 flex items-center justify-center text-center text-base lg:text-lg font-bold text-slate-800 leading-tight";
            div.textContent = wp.name;

            fo.appendChild(div);
            labelsContainer.appendChild(fo);
        });

        function updateMoonPhase(day) {
            dayDisplay.textContent = day;
            
            const angle = -((day - 1) / 28) * 360; 
            const rad = angle * (Math.PI / 180);
            const x = cx + orbitRadius * Math.cos(rad);
            const y = cy + orbitRadius * Math.sin(rad);

            dynamicMoon.setAttribute("transform", `translate(${x}, ${y})`);
            moonVisibleGroup.setAttribute("transform", `rotate(${angle})`);

            const arrowStartX = -55 * Math.cos(rad);
            const arrowStartY = -55 * Math.sin(rad);
            const arrowEndX = -95 * Math.cos(rad);
            const arrowEndY = -95 * Math.sin(rad);
            moonArrow.setAttribute("x1", arrowStartX);
            moonArrow.setAttribute("y1", arrowStartY);
            moonArrow.setAttribute("x2", arrowEndX);
            moonArrow.setAttribute("y2", arrowEndY);

            // Phasenname NUR an den 8 Wegpunkten anzeigen
            phaseName.textContent = dayToName[day] || "";

            // SVG-Mondzeichnung in der schwarzen Box bleibt tagesgenau
            const progress = (day - 1) / 28;
            const angle3D = progress * 360;

            let d = "";
            if (angle3D < 0.5 || angle3D > 359.5) {
                d = "";
            } else if (Math.abs(angle3D - 180) < 0.5) {
                d = "M 0 50 A 50 50 0 0 1 100 50 A 50 50 0 0 1 0 50 Z";
            } else {
                const isWaxing = angle3D < 180;
                const phaseAngle = isWaxing ? angle3D : 360 - angle3D;
                const rx = Math.abs(50 * Math.cos(phaseAngle * Math.PI / 180));

                if (isWaxing) {
                    if (angle3D <= 90) {
                        d = `M 50 0 A 50 50 0 0 1 50 100 A ${rx} 50 0 0 0 50 0 Z`;
                    } else {
                        d = `M 50 0 A 50 50 0 0 1 50 100 A ${rx} 50 0 0 1 50 0 Z`;
                    }
                } else {
                    if (angle3D >= 270) {
                        d = `M 50 0 A 50 50 0 0 0 50 100 A ${rx} 50 0 0 1 50 0 Z`;
                    } else {
                        d = `M 50 0 A 50 50 0 0 0 50 100 A ${rx} 50 0 0 0 50 0 Z`;
                    }
                }
            }
            moonPhasePath.setAttribute("d", d);
        }

        daySlider.addEventListener('input', (e) => {
            updateMoonPhase(parseInt(e.target.value));
        });

        updateMoonPhase(1);

        // --- Toggle Logik für die Buttons ---
        function setupToggle(btnId, elementId) {
            const btn = document.getElementById(btnId);
            const el = document.getElementById(elementId);
            let isVisible = false;

            btn.addEventListener('click', () => {
                isVisible = !isVisible;
                el.style.display = isVisible ? '' : 'none';
                
                if (isVisible) {
                    btn.classList.remove('bg-slate-200', 'text-slate-600', 'hover:bg-slate-300');
                    btn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700', 'shadow-md');
                } else {
                    btn.classList.add('bg-slate-200', 'text-slate-600', 'hover:bg-slate-300');
                    btn.classList.remove('bg-blue-600', 'text-white', 'hover:bg-blue-700', 'shadow-md');
                }
            });
        }

        setupToggle('btn-arrows', 'phase-arrows');
        setupToggle('btn-labels', 'labels-container');
        setupToggle('btn-visible', 'visible-side-group');
        setupToggle('btn-shadow', 'moon-shadow');

    </script>
</body>
</html>
